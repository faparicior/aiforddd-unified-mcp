name: create-domain-specification-wow
description: Analyze Specification patterns in a code manifest and generate a DDD Domain Layer Specification WoW document
arguments:
  - name: manifest_path
    required: true
messages: |
  You are to analyze Specification patterns from a code manifest located at: {{manifest_path}}/code-manifest.md
  and produce a DDD Domain Layer - Specifications Way of Working (WoW) document.

  The output file must be written to: {{manifest_path}}/wow/ddd-specification-wow.md

  Note: Specifications encapsulate composable business rules for filtering, querying, or validating
  domain objects. They belong to the Domain Layer. Do not confuse with Domain Services (which
  orchestrate operations) or inline validation in entities.

  Follow these steps to produce a high-quality, pattern-rich WoW document.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-domain-specification-wow.md" to retrieve
  the full template. Keep it in context — you will fill every variable in it during Step 5.

  # Step 1: Assess the manifest

  - Call `filter_and_count_rows` with `columnName = "Layer"`, `value = "Domain Layer"`, `extraFilters = { "Category": "Specification" }`, `excludeFilters = { "Processed": "✓" }` to count unprocessed Specification classes
  - If the call fails, stop immediately and report the error
  - If the count is 0, write the output file with a note that no classes were found, then stop
  - Record the count; it determines the retrieval strategy in Step 2

  # Step 2: Collect all relevant classes

  - Retrieve all unprocessed Specification classes via `get_multiple_rows_by_multiple_columns`
    with filters = { "Layer": "Domain Layer", "Category": "Specification" }, excludeFilters = { "Processed": "✓" },
    and selectColumns = ["Identifier", "Class", "File", "Possible outsider"]
  - If the result is empty, write a note to the output file stating all classes are already documented, then stop
  - Note all classes where the "Possible outsider" column is marked (✓)

  # Step 3: Read source files

  Construct absolute file paths as: {{manifest_path}}/../<File column value from manifest>
  (the manifest_path points to the .aiforddd directory; source files are relative to the repo root above it)

  Process source files in batches of 6–8 files per `read_multiple_files_compressed` call regardless
  of codebase size. Complete pattern analysis for each batch before reading the next.
  Read the ENTIRE file — no line limits, no shortcuts.

  ## Proactive cross-cutting discovery
  Before reading specification files, query other Domain Layer classes to understand what
  domain objects are filtered and what services use these specifications.

  Call `get_multiple_rows_by_multiple_columns` with
    filters = { "Layer": "Domain Layer" },
    excludeFilters = { "Category": "Specification", "Processed": "✓" },
    selectColumns = ["Identifier", "Class", "File", "Category", "Description"]

  For each class returned:
  1. Construct the absolute path as: {{manifest_path}}/../<File value>
  2. Add it to the reading batch alongside the specification files.
  3. Record its Identifier and file path in the AdjacentCollaborators list of the Coverage Summary,
     using the format: `- [Identifier] FileName.kt _(adjacent collaborator)_`.
  Do NOT mark these classes as processed — they will be covered by their own WoW document.

  If the call returns nothing, continue — the absence is itself informative.

  ## Adjacent collaborator discovery
  While reading each specification file, note any directly referenced classes that are NOT in
  the batch but are relevant to understanding the specification — for example:
  - Domain entities or aggregates that are filtered by this specification
  - Other specifications composed with this one
  - Domain services or repositories that use specifications as query criteria
  - Value objects used within specification logic

  For each such class found:
  1. Call `get_first_row_by_column` on {{manifest_path}}/code-manifest.md with
     `columnName = "Class"` and the class name as `value` to retrieve its manifest row.
  2. If not found in the manifest, skip.
  3. Construct the absolute path as: {{manifest_path}}/../<File value from manifest row>
  4. Call `read_multiple_files_compressed` on that path to read the file.
  5. Include its patterns in the analysis.
  6. Record its Identifier and file path in the AdjacentCollaborators list of the Coverage Summary,
     using the format: `- [Identifier] FileName.kt _(adjacent collaborator)_`.
  Do NOT mark these classes as processed.

  # Step 4: Identify patterns

  Analyze each specification class and extract reusable patterns. Focus on:

  ## Specification Definition Patterns
  Focus on: How specifications declare their predicate (isSatisfiedBy, matches, isValid),
  parameter injection in constructors vs. method parameters, immutability of specification instances.

  ## Composition Patterns
  Focus on: How specifications are composed (and, or, not, allOf, anyOf), fluent builder APIs
  for complex specifications, combinatorial specification trees.

  ## Usage Patterns
  Focus on: How specifications are used in domain services, repositories (as query criteria),
  entities for validation checks, and use cases for filtering result sets.

  ## Naming & Grouping Patterns
  Focus on: Naming conventions (EligibleFor*, HasValid*, IsActive*, CanBe*), grouping compound
  specifications into composite classes, organising specifications by aggregate root.

  ## Parameter & Dependency Patterns
  Focus on: How specifications receive thresholds and configuration (constructor injection vs.
  companion object constants), handling specifications that depend on domain policies or clocks.

  IMPORTANT — specification scope boundary:
  Specifications cover predicate logic for filtering and validation only.
  Business workflow orchestration belongs in Domain Services or Use Cases.
  Add a cross-reference note when encountering out-of-scope patterns.

  For each pattern found:
  - Assign a unique pattern ID following the format:
    - `SPEC-DEF-XX` for specification definition and predicate patterns
    - `SPEC-CPL-XX` for composition and combinatorial patterns
    - `SPEC-USG-XX` for usage in services, repositories, and entities
    - `SPEC-NMG-XX` for naming, grouping, and organisation patterns
    - `SPEC-PRM-XX` for parameter injection and dependency handling patterns
  - Write a descriptive pattern name capturing the architectural intent
  - Extract a GOOD code example from the source file — copy the structure and logic exactly, but IMMEDIATELY replace every domain-specific class name, method name, field name, enum value, and identifier with a generic equivalent (Order, User, Product, Payment, Item, Customer). NO real names from the codebase may appear in the example.
  - Derive an anti-pattern (BAD) counterexample that illustrates the violation of the pattern
  - Record the source file name and class index identifier from the manifest
  - For classes flagged as "Possible outsider" (✓), document why the class may not belong in its
    current layer and include it as an anti-pattern entry

  # Step 5: Fill in the template

  Replace every `{{Variable}}` in the loaded template with content derived from the codebase analysis.
  The template's own "Usage Instructions" and "Template Variables Reference" sections describe exactly
  what each variable expects — follow them. Use the generic code produced in Step 4 directly.
  Anti-patterns for "Possible outsider" entries come from the manifest's Possible outsider column (✓).

  # Step 6: Write the output file

  - Write the completed document to {{manifest_path}}/wow/ddd-specification-wow.md
  - Strip everything from "Template Variables Reference" onward — the final file must contain
    no template instructions, variable definitions, or usage notes.
