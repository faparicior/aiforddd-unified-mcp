name: enrich-wow-document
description: Enrich an existing WoW document with additional patterns discovered from a new batch of source files.
arguments:
  - name: manifest_path
    required: true
  - name: wow_type
    required: true
  - name: output_file
    required: true
  - name: chunk_number
    required: true
  - name: chunk_total
    required: true
  - name: files_json
    required: true
messages: |
  You are to enrich an existing Way of Working (WoW) document with additional patterns discovered
  from a new batch of source files. This is chunk {{chunk_number}} of {{chunk_total}}.

  Existing document: {{manifest_path}}/wow/{{output_file}}
  WoW type: {{wow_type}}

  Follow these steps precisely.

  # Step 0: Read the existing document

  Call `read_file` with path {{manifest_path}}/wow/{{output_file}} to load the current document.
  Keep it fully in context — you will update it in Step 3.

  Scan it to determine:
  - Which pattern IDs are already used (e.g., ENT-IDN-01, CTL-REQ-02) — so you can assign
    the next sequential IDs for new patterns
  - Which source files have already been documented in the Pattern Index table
  - The current coverage numbers

  # Step 1: Review this chunk's files

  The following classes have been pre-selected for this chunk (JSON array):
  {{files_json}}

  Parse this JSON array. Each object contains:
  - File: source file path relative to the repository root
  - Identifier: unique class identifier from the manifest
  - Category: the class category
  - Layer: the architectural layer
  - Possible outsider: "✓" if flagged as a candidate anti-pattern, empty otherwise

  If the array is empty, skip to Step 3 (remove the enrichment note if this is the last chunk).

  # Step 2: Read source files and identify new patterns

  Construct absolute file paths as: {{manifest_path}}/../<File value>
  (manifest_path points to .aiforddd; source files are relative to the repo root above it)

  Process files in batches of 6–8 per `read_multiple_files_compressed` call.
  Complete pattern analysis for each batch before reading the next.
  Read the ENTIRE file — no line limits, no shortcuts.

  For each file, identify patterns that are NOT already documented in the existing document.
  Look for:
  - Patterns that add new insights not yet covered
  - Variations or nuances of existing patterns (document as a sub-note, not a new pattern entry)
  - New anti-pattern examples

  Assign new pattern IDs continuing from the highest existing ID in each category.

  For code examples: IMMEDIATELY replace every domain-specific name with a generic equivalent
  (Order, User, Product, Payment, Item, Customer). NO real names may appear in examples.

  # Step 3: Update the document

  Produce an updated version of the document with:
  1. New pattern entries appended after existing patterns in their respective sections
  2. New rows added to the Pattern Index table
  3. Coverage Summary updated: increment the analyzed count by the number of new files
  4. Architecture Observations section: add any new observations or strengthen existing ones

  If this is the LAST chunk ({{chunk_number}} == {{chunk_total}}):
  - Remove the "Note: This document was generated from chunk..." line entirely
  - Ensure the Coverage Summary reflects the total files processed across all chunks

  If this is NOT the last chunk:
  - Update the note to: "> **Note**: This document covers chunks 1–{{chunk_number}} of {{chunk_total}}."

  # Step 4: Write the updated document

  - Overwrite {{manifest_path}}/wow/{{output_file}} with the updated content
  - The document must remain complete and valid after this update
  - Strip any template instructions if accidentally reintroduced
