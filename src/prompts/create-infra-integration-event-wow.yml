name: create-infra-integration-event-wow
description: Analyze Integration Event patterns in a code manifest and generate a DDD Infrastructure Layer Integration Event WoW document
arguments:
  - name: manifest_path
    required: true
messages: |
  You are to analyze Integration Event patterns from a code manifest located at: {{manifest_path}}/code-manifest.md
  and produce a DDD Infrastructure Layer - Integration Events Way of Working (WoW) document.

  The output file must be written to: {{manifest_path}}/wow/ddd-integration-event-wow.md

  Note: For event consumers (classes that process events) use create-event-consumer-wow.
  For event producers (classes that publish events) use create-event-producer-wow.
  This prompt focuses on the Integration Event DTO classes themselves — the envelopes, payloads,
  nested objects, and descriptors that represent the data crossing system boundaries.

  Follow these steps to produce a high-quality, pattern-rich WoW document.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-infra-integration-event-wow.md" to retrieve
  the full template. Keep it in context — you will fill every variable in it during Step 5.

  # Step 1: Assess the manifest

  - Call `filter_and_count_rows` with `columnName = "Layer"`, `value = "Infrastructure Layer"`, `extraFilters = { "Category": "Integration event" }`, `excludeFilters = { "Processed": "✓" }` to count unprocessed Integration event classes
  - If the call fails, stop immediately and report the error — do not infer counts from retrieval results
  - If the count is 0, do not search for alternatives or classes in other layers/categories.
    Write the output file with a note stating that no classes were found for the expected layer/category,
    and that the developer must ensure the manifest is catalogued correctly before running this prompt again.
    Then stop — do not proceed to Step 2.
  - Record the count explicitly; it determines the retrieval strategy in Step 2

  # Step 2: Collect all relevant classes

  - Retrieve all unprocessed Integration event classes in a single `get_multiple_rows_by_multiple_columns` call
    with filters = { "Layer": "Infrastructure Layer", "Category": "Integration event" }, excludeFilters = { "Processed": "✓" },
    and selectColumns = ["Class name", "File", "Possible outsider"]
  - If the result is empty, write a note to the output file stating all classes are already documented, then stop
  - Focus exclusively on: Integration event category in the Infrastructure Layer
  - Note all classes where the "Possible outsider" column is marked (✓) — these are candidate
    anti-pattern examples for the Anti-Patterns section of the document

  # Step 3: Read source files

  Construct absolute file paths as: {{manifest_path}}/../<File column value from manifest>
  (the manifest_path points to the .aiforddd directory; source files are relative to the repo root above it)

  Process source files in batches of 6–8 files per `read_multiple_files_compressed` call regardless
  of codebase size. Complete pattern analysis for each batch before reading the next.
  Read the ENTIRE file — no line limits, no shortcuts.

  ## Proactive cross-cutting discovery
  Before reading integration event files, query the manifest for classes in the Infrastructure
  Layer that are NOT Integration Events and have not been processed — these may be event consumers
  or producers that use these DTOs, providing context for how the events are used.

  Call `get_multiple_rows_by_multiple_columns` with
    filters = { "Layer": "Infrastructure Layer" },
    excludeFilters = { "Category": "Integration event", "Processed": "✓" },
    selectColumns = ["Identifier", "Class", "File", "Category", "Description"]

  For each class returned:
  1. Construct the absolute path as: {{manifest_path}}/../<File value>
  2. Add it to the reading batch alongside the integration event files.
  3. Record its Identifier and file path in the AdjacentCollaborators list of the Coverage Summary,
     using the format: `- [Identifier] FileName.kt _(adjacent collaborator)_`.
  Do NOT mark these classes as processed — they will be covered by their own WoW document.

  If the call returns nothing, continue — the absence is itself informative.

  ## Adjacent collaborator discovery
  While reading each source file, note any directly referenced classes that are NOT in
  the batch but are relevant to understanding the event's structure — for example:
  - An event consumer that deserializes this event
  - A domain command this event maps to (via toCommand() methods)
  - A base event envelope class
  - A nested DTO or payload class in a separate file

  For each such class found:
  1. Call `get_first_row_by_column` on {{manifest_path}}/code-manifest.md with
     `columnName = "Class"` and the class name as `value` to retrieve its manifest row.
  2. If not found in the manifest, skip.
  3. Construct the absolute path as: {{manifest_path}}/../<File value from manifest row>
  4. Call `read_multiple_files_compressed` on that path to read the file.
  5. Include its patterns in the analysis.
  6. Record its Identifier and file path in the AdjacentCollaborators list of the Coverage Summary,
     using the format: `- [Identifier] FileName.kt _(adjacent collaborator)_`.
  Do NOT mark these classes as processed.

  # Step 4: Identify patterns

  Analyze each integration event class and extract reusable patterns. Focus on:

  ## Event Envelope Patterns
  Focus on: Top-level event wrapper structure (id, type, version, published, actor, provider),
  how metadata fields are defined, generic vs. typed envelopes, envelope reuse across event types.

  ## Event Payload Patterns
  Focus on: How typed payload/DTO classes are structured, field naming conventions (e.g. @id, @type,
  @JsonProperty), use of primitives vs. domain types, nullable vs. required fields.

  ## Nested Object Patterns
  Focus on: How complex events decompose into nested DTO classes (Properties, Product, Context,
  Device, Page), naming conventions for nested types, co-location in the same file vs. separate files.

  ## Deserialization Annotation Patterns
  Focus on: Deserialization annotations or decorators (e.g. @JsonProperty or equivalent),
  schema binding annotations, dynamic property handling, version tolerance patterns.

  ## Domain Mapping Patterns
  Focus on: How integration event DTOs provide mapping methods (e.g. toCommand(), toDomainModel()),
  the anti-corruption boundary between external event shape and domain model,
  validation at mapping time (null checks, format parsing).

  IMPORTANT — integration event scope boundary:
  The integration event WoW covers only event DTO design: envelope structure, payload structure,
  nested objects, deserialization, and domain mapping.
  Event consumer mechanics (listener binding, acknowledgment) belong in the Event Consumer WoW.
  Event producer mechanics (serialization, topic routing) belong in the Event Producer WoW.
  Add a cross-reference note when encountering out-of-scope patterns.

  For each pattern found:
  - Assign a unique pattern ID following the format:
    - `IEV-ENV-XX` for event envelope and metadata patterns
    - `IEV-PLD-XX` for payload and DTO structure patterns
    - `IEV-NST-XX` for nested object decomposition patterns
    - `IEV-DSR-XX` for deserialization annotation patterns
    - `IEV-MAP-XX` for domain mapping and anti-corruption patterns
  - Write a descriptive pattern name capturing the architectural intent
  - Extract a GOOD code example from the source file — copy the structure and logic exactly, but IMMEDIATELY replace every domain-specific class name, method name, field name, enum value, and identifier with a generic equivalent (Order, User, Product, Payment, Item, Customer). NO real names from the codebase may appear in the example.
  - Derive an anti-pattern (BAD) counterexample that illustrates the violation of the pattern
  - Record the source file name and class index identifier from the manifest
  - For classes flagged as "Possible outsider" (✓), document why the class may not belong in its
    current layer and include it as an anti-pattern entry

  # Step 5: Fill in the template

  Replace every `{{Variable}}` in the loaded template with content derived from the codebase analysis.
  The template's own "Usage Instructions" and "Template Variables Reference" sections describe exactly
  what each variable expects — follow them. Use the generic code produced in Step 4 directly —
  all names are already generic. Preserve
  the structure and logic exactly as-is.
  Document the event envelope structure, serialization technology, version strategy, and how
  integration events are mapped to domain commands/models at the anti-corruption boundary.
  Anti-patterns for "Possible outsider" entries come from the manifest's Possible outsider column (✓).

  # Step 6: Write the output file

  - Write the completed document to {{manifest_path}}/wow/ddd-integration-event-wow.md
  - Strip everything from "Template Variables Reference" onward — the final file must contain
    no template instructions

  # Step 7: Mark classes as processed

  For every class retrieved in Step 2, call `update_row_by_column` using the Identifier column value
  to mark the Processed column with ✓. Process all classes — do not skip any.

  # Step 8: Quality review and cleanup

  Re-read the full document and apply the following cleanup:

  **Duplicate pattern detection**: If two or more patterns describe the same concept, merge
  them into the richer one and remove the weaker entry. Update all Pattern Index references.

  **Pattern completeness**: For any pattern missing a ✅ GOOD code example, a ❌ BAD
  counter-example, or a "Why it's bad" explanation, add the missing piece.

  **Open questions**: For each item in the "❓ Open Questions" section, check whether
  any source file read during this session already answers it. Remove answered questions and
  add the answer in the relevant section.

  **Dangling references**: If any pattern entry references a file identifier not listed in
  the Pattern Index table, add the missing row.
