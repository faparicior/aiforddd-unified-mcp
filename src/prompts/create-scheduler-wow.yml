name: create-scheduler-wow
description: Analyze Scheduler and Batch Processor patterns in a code manifest and generate a DDD UI Layer Scheduler WoW document
arguments:
  - name: manifest_path
    required: true
messages: |
  You are to analyze Scheduler and Batch Processor patterns from a code manifest located at: {{manifest_path}}/code-manifest.md
  and produce a DDD UI Layer - Schedulers & Batch Processors Way of Working (WoW) document.

  The output file must be written to: {{manifest_path}}/wow/ddd-scheduler-wow.md

  Note: For other UI layer concerns use the dedicated prompts:
  - REST controllers → create-controller-wow
  - Event consumers → create-event-consumer-wow

  Follow these steps to produce a high-quality, pattern-rich WoW document.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-scheduler-wow.md" to retrieve
  the full template. Keep it in context — you will fill every variable in it during Step 5.

  # Step 1: Assess the manifest

  - Call `filter_and_count_rows` to count Scheduler classes in the User Interface Layer
    (Layer = "User Interface Layer", Category = "Scheduler")
  - If the call fails, stop immediately and report the error — do not infer counts from retrieval results
  - Record the count; it determines the retrieval strategy in Step 2

  # Step 2: Collect all relevant classes

  Use the count from Step 1 to plan retrieval:
  - If the total is ≤ 30 classes: retrieve all in a single `get_multiple_rows_by_column` call
    with maxRows set to the count from Step 1
  - If the total is > 30 classes: retrieve in sequential batches of 20, incrementing the offset
    until the total retrieved equals the Step 1 count
  - Verify: the sum of all retrieved rows must equal the Step 1 count before proceeding
  - Focus exclusively on: Scheduler category
  - Note all classes where the "Possible outsider" column is marked (✓) — these are candidate
    anti-pattern examples for the Anti-Patterns section of the document

  # Step 3: Read source files

  Construct absolute file paths as: {{manifest_path}}/../<File column value from manifest>
  (the manifest_path points to the .aiforddd directory; source files are relative to the repo root above it)

  Process source files in batches of 6–8 files per `read_multiple_files_compressed` call regardless
  of codebase size. Complete pattern analysis for each batch before reading the next.
  Read the ENTIRE file — no line limits, no shortcuts.

  # Step 4: Identify patterns

  Analyze each scheduler/batch class and extract reusable patterns. Focus on:

  ## Trigger & Cron Patterns
  Focus on: Scheduling annotations, cron expressions, fixed-rate vs. fixed-delay triggers,
  environment guards (disabled in dev/test), conditional execution flags.

  ## Distributed Lock Patterns
  Focus on: Lock acquisition mechanism, lock key strategy, TTL configuration, behavior when
  lock cannot be acquired (skip-and-log vs. throw), lock release in finally block.

  ## Batch Processing Patterns
  Focus on: Chunk size configuration, iteration strategy (offset-based, cursor-based),
  delegation to application layer use cases per item or per chunk.

  ## Partial Failure & Recovery Patterns
  Focus on: Per-item failure isolation (continue vs. abort), retry behavior, resumability
  from last checkpoint, error logging and alerting.

  ## Progress Tracking Patterns
  Focus on: Metrics emission (processed count, failed count, duration), structured log output,
  alerting thresholds.

  For each pattern found:
  - Assign a unique pattern ID following the format:
    - `SCH-TRG-XX` for trigger and cron configuration patterns
    - `SCH-LCK-XX` for distributed lock and concurrency patterns
    - `SCH-CHK-XX` for chunking and batch partitioning patterns
    - `SCH-ERR-XX` for error handling and recovery patterns
    - `SCH-PRG-XX` for progress tracking and observability patterns
  - Write a descriptive pattern name capturing the architectural intent
  - Extract a GOOD code example verbatim from the source file (use real code, not invented)
  - Derive an anti-pattern (BAD) counterexample that illustrates the violation of the pattern
  - Record the source file name and class index identifier from the manifest
  - For classes flagged as "Possible outsider" (✓), document why the class may not belong in its
    current layer and include it as an anti-pattern entry

  # Step 5: Fill in the template

  Replace every `{{Variable}}` in the loaded template with content derived from the codebase analysis.
  The template's own "Usage Instructions" and "Template Variables Reference" sections describe exactly
  what each variable expects — follow them. Use the verbatim code extracted in Step 4, substituting
  domain-specific names with generic equivalents (Order, User, Product, Payment) while preserving
  the structure and logic exactly — only the names change.
  Document actual cron expressions, lock mechanisms, chunk sizes, and retry policies from the code.
  Anti-patterns for "Possible outsider" entries come from the manifest's Possible outsider column (✓).

  # Step 6: Write the output file

  - Write the completed document to {{manifest_path}}/wow/ddd-scheduler-wow.md
  - Strip everything from "Template Variables Reference" onward — the final file must contain
    no template instructions

  # Step 7: Mark classes as processed

  For every class retrieved in Step 2, call `update_row_by_column` using the Identifier column value
  to mark the Processed column with ✓. Process all classes — do not skip any.
