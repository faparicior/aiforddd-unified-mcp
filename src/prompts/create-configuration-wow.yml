name: create-configuration-wow
description: Analyze Configuration patterns in a code manifest and generate a DDD Infrastructure Layer Configuration WoW document
arguments:
  - name: manifest_path
    required: true
messages: |
  You are to analyze Configuration patterns from a code manifest located at: {{manifest_path}}/code-manifest.md
  and produce a DDD Infrastructure Layer - Configuration Way of Working (WoW) document.

  The output file must be written to: {{manifest_path}}/wow/ddd-configuration-wow.md

  Note: For Integration Services use create-integration-service-wow.
  For Repositories use create-repository-wow.
  This prompt focuses exclusively on Configuration classes — Spring @Configuration, application
  entry points, bean wiring, and infrastructure setup classes.

  Follow these steps to produce a high-quality, pattern-rich WoW document.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-configuration-wow.md" to retrieve
  the full template. Keep it in context — you will fill every variable in it during Step 5.

  # Step 1: Assess the manifest

  - Call `filter_and_count_rows` to count Configuration classes in the Infrastructure Layer
    (Layer = "Infrastructure Layer", Category = "Configuration")
  - If the call fails, stop immediately and report the error — do not infer counts from retrieval results
  - If the count is 0, do not search for alternatives or classes in other layers/categories.
    Write the output file with a note stating that no classes were found for the expected layer/category,
    and that the developer must ensure the manifest is catalogued correctly before running this prompt again.
    Then stop — do not proceed to Step 2.
  - Record the count explicitly; it determines the retrieval strategy in Step 2

  # Step 2: Collect all relevant classes

  Use the count from Step 1 to plan retrieval:
  - If the layer has ≤ 30 classes: retrieve all in a single `get_multiple_rows_by_column` call
    with maxRows set to the count from Step 1
  - If the layer has > 30 classes: retrieve in sequential batches of 20, incrementing the offset
    until the total retrieved equals the Step 1 count
  - Verify: the sum of all retrieved rows must equal the Step 1 count before proceeding
  - Focus exclusively on: Configuration category in the Infrastructure Layer
  - Note all classes where the "Possible outsider" column is marked (✓) — these are candidate
    anti-pattern examples for the Anti-Patterns section of the document

  # Step 3: Read source files

  Construct absolute file paths as: {{manifest_path}}/../<File column value from manifest>
  (the manifest_path points to the .aiforddd directory; source files are relative to the repo root above it)

  Process source files in batches of 6–8 files per `read_multiple_files_compressed` call regardless
  of codebase size. Complete pattern analysis for each batch before reading the next.
  Read the ENTIRE file — no line limits, no shortcuts.

  # Step 4: Identify patterns

  Analyze each configuration class and extract reusable patterns. Focus on:

  ## Application Wiring Patterns
  Focus on: How use cases and application services are wired (constructor injection, bean/component registration),
  separation of application layer components vs. infrastructure components, how port interfaces are connected
  to their adapter implementations.

  ## Infrastructure Component Patterns
  Focus on: How infrastructure adapters (repositories, API clients, event producers) are instantiated,
  multi-instance component creation (per-site configurations, per-tenant), how environment-specific config
  properties are injected (environment variables, configuration files, or property injection mechanisms).

  ## External Client Configuration Patterns
  Focus on: HTTP client configuration, retry policies, timeout settings,
  connection pool configuration, base URL and auth key injection, per-client customization.

  ## Messaging Configuration Patterns
  Focus on: Messaging broker consumer/producer wiring, stream binding configuration, consumer group
  setup, how multiple consumers for different topics are configured consistently.

  ## Application Entry Point Patterns
  Focus on: Application entry point annotations or decorators, component scan / auto-discovery
  configuration, bootstrap configuration, profile or environment activation.

  For each pattern found:
  - Assign a unique pattern ID following the format:
    - `CFG-WIR-XX` for application wiring and bean composition patterns
    - `CFG-INF-XX` for infrastructure component instantiation patterns
    - `CFG-CLT-XX` for external client configuration patterns
    - `CFG-MSG-XX` for messaging and stream configuration patterns
    - `CFG-APP-XX` for application entry point and bootstrap patterns
  - Write a descriptive pattern name capturing the architectural intent
  - Extract a GOOD code example from the source file — copy the structure and logic exactly, but IMMEDIATELY replace every domain-specific class name, method name, field name, enum value, and identifier with a generic equivalent (Order, User, Product, Payment, Item, Customer). NO real names from the codebase may appear in the example.
  - Derive an anti-pattern (BAD) counterexample that illustrates the violation of the pattern
  - Record the source file name and class index identifier from the manifest
  - For classes flagged as "Possible outsider" (✓), document why the class may not belong in its
    current layer and include it as an anti-pattern entry

  # Step 5: Fill in the template

  Replace every `{{Variable}}` in the loaded template with content derived from the codebase analysis.
  The template's own "Usage Instructions" and "Template Variables Reference" sections describe exactly
  what each variable expects — follow them. Use the generic code produced in Step 4 directly —
  all names are already generic. Preserve
  the structure and logic exactly as-is.
  Document the bean wiring strategy, how ports are connected to adapters, the external client
  configuration approach, and how multi-site or multi-tenant configurations are structured.
  Anti-patterns for "Possible outsider" entries come from the manifest's Possible outsider column (✓).

  # Step 6: Write the output file

  - Write the completed document to {{manifest_path}}/wow/ddd-configuration-wow.md
  - Strip everything from "Template Variables Reference" onward — the final file must contain
    no template instructions

  # Step 7: Mark classes as processed

  For every class retrieved in Step 2, call `update_row_by_column` using the Identifier column value
  to mark the Processed column with ✓. Process all classes — do not skip any.
