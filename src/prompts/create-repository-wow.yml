name: create-repository-wow
description: Analyze Repository implementation patterns in a code manifest and generate a DDD Infrastructure Layer Repository WoW document
arguments:
  - name: manifest_path
    required: true
messages: |
  You are to analyze Repository implementation patterns from a code manifest located at: {{manifest_path}}/code-manifest.md
  and produce a DDD Infrastructure Layer - Repositories Way of Working (WoW) document.

  The output file must be written to: {{manifest_path}}/wow/ddd-repository-wow.md

  Note: For other infrastructure concerns use the dedicated prompts:
  - Event producers → create-event-producer-wow
  - API clients → create-api-client-wow

  Follow these steps to produce a high-quality, pattern-rich WoW document.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-repository-wow.md" to retrieve
  the full template. Keep it in context — you will fill every variable in it during Step 5.

  # Step 1: Assess the manifest

  - Call `filter_and_count_rows` to count Repository classes in the Infrastructure Layer
    (Layer = "Infrastructure Layer", Category = "Repository")
  - If the call fails, stop immediately and report the error — do not infer counts from retrieval results
  - Record the count explicitly; it determines the retrieval strategy in Step 2

  # Step 2: Collect all relevant classes

  Use the count from Step 1 to plan retrieval:
  - If the layer has ≤ 30 classes: retrieve all in a single `get_multiple_rows_by_column` call
    with maxRows set to the count from Step 1
  - If the layer has > 30 classes: retrieve in sequential batches of 20, incrementing the offset
    until the total retrieved equals the Step 1 count
  - Verify: the sum of all retrieved rows must equal the Step 1 count before proceeding
  - Focus exclusively on: Repository category
  - Note all classes where the "Possible outsider" column is marked (✓) — these are candidate
    anti-pattern examples for the Anti-Patterns section of the document

  # Step 3: Read source files

  Construct absolute file paths as: {{manifest_path}}/../<File column value from manifest>
  (the manifest_path points to the .aiforddd directory; source files are relative to the repo root above it)

  Process source files in batches of 6–8 files per `read_multiple_files_compressed` call regardless
  of codebase size. Complete pattern analysis for each batch before reading the next.
  Read the ENTIRE file — no line limits, no shortcuts.

  # Step 4: Identify patterns

  Analyze each repository class and extract reusable patterns. Focus on:

  ## Port Implementation Patterns
  Focus on: Which domain repository port interface is implemented, how the class declaration
  expresses this, separation between the port interface (domain) and the adapter (infrastructure).

  ## Aggregate Reconstruction Patterns
  Focus on: How persistence entities (ORM entities) are mapped back to domain aggregates,
  mapper class usage vs. factory methods, value object reconstruction, association loading strategy.

  ## Query Builder Patterns
  Focus on: Query construction mechanism (JPQL, QueryDSL, Spring Data, jOOQ), dynamic filter
  composition, parameterized query enforcement, pagination and sorting.

  ## Transaction Management Patterns
  Focus on: @Transactional placement (use case vs. repository), propagation attributes,
  isolation levels, optimistic locking (version field), pessimistic locking usage.

  ## Infrastructure Exception Translation Patterns
  Focus on: How DB-specific exceptions (constraint violations, optimistic lock conflicts,
  connection errors) are caught and re-thrown as domain exceptions.

  For each pattern found:
  - Assign a unique pattern ID following the format:
    - `REP-AGG-XX` for aggregate reconstruction and mapping patterns
    - `REP-QRY-XX` for query builder and data retrieval patterns
    - `REP-TXN-XX` for transaction management patterns
    - `REP-PRJ-XX` for projection and read model patterns
    - `REP-ERR-XX` for infrastructure exception translation patterns
  - Write a descriptive pattern name capturing the architectural intent
  - Extract a GOOD code example verbatim from the source file (use real code, not invented)
  - Derive an anti-pattern (BAD) counterexample that illustrates the violation of the pattern
  - Record the source file name and class index identifier from the manifest
  - For classes flagged as "Possible outsider" (✓), document why the class may not belong in its
    current layer and include it as an anti-pattern entry

  # Step 5: Fill in the template

  Replace every `{{Variable}}` in the loaded template with content derived from the codebase analysis.
  The template's own "Usage Instructions" and "Template Variables Reference" sections describe exactly
  what each variable expects — follow them. Use the verbatim code extracted in Step 4, substituting
  domain-specific names with generic equivalents (Order, User, Product, Payment) while preserving
  the structure and logic exactly — only the names change.
  Identify the port interface each repository implements and include it in the template.
  Document the actual ORM/query technology, transaction strategy, and exception translation approach.
  Anti-patterns for "Possible outsider" entries come from the manifest's Possible outsider column (✓).

  # Step 6: Write the output file

  - Write the completed document to {{manifest_path}}/wow/ddd-repository-wow.md
  - Strip everything from "Template Variables Reference" onward — the final file must contain
    no template instructions
