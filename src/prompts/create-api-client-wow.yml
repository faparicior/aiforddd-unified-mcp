name: create-api-client-wow
description: Analyze outbound API Client patterns in a code manifest and generate a DDD Infrastructure Layer API Client WoW document
arguments:
  - name: manifest_path
    required: true
messages: |
  You are to analyze outbound API Client implementation patterns from a code manifest located at: {{manifest_path}}/code-manifest.md
  and produce a DDD Infrastructure Layer - API Clients Way of Working (WoW) document.

  The output file must be written to: {{manifest_path}}/wow/ddd-api-client-wow.md

  Note: For other infrastructure concerns use the dedicated prompts:
  - Repositories → create-repository-wow
  - Event producers → create-event-producer-wow

  Follow these steps to produce a high-quality, pattern-rich WoW document.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-api-client-wow.md" to retrieve
  the full template. Keep it in context — you will fill every variable in it during Step 5.

  # Step 1: Assess the manifest

  - Call `filter_and_count_rows` to count API client classes in the Infrastructure Layer
    (Layer = "Infrastructure Layer", Category = "API client")
  - Call `filter_and_count_rows` to count Gateway classes in the Infrastructure Layer
    (Layer = "Infrastructure Layer", Category = "Gateway")
  - If either call fails, stop immediately and report the error — do not infer counts from retrieval results
  - Record both counts; the total determines the retrieval strategy in Step 2

  # Step 2: Collect all relevant classes

  Use the total count from Step 1 to plan retrieval:
  - If the total is ≤ 30 classes: retrieve all in a single `get_multiple_rows_by_column` call
    with maxRows set to the total from Step 1
  - If the total is > 30 classes: retrieve in sequential batches of 20, incrementing the offset
    until the total retrieved equals the Step 1 total
  - Verify: the sum of all retrieved rows must equal the Step 1 total before proceeding
  - Focus exclusively on: API client and Gateway categories
  - Note all classes where the "Possible outsider" column is marked (✓) — these are candidate
    anti-pattern examples for the Anti-Patterns section of the document

  # Step 3: Read source files

  Construct absolute file paths as: {{manifest_path}}/../<File column value from manifest>
  (the manifest_path points to the .aiforddd directory; source files are relative to the repo root above it)

  Process source files in batches of 6–8 files per `read_multiple_files_compressed` call regardless
  of codebase size. Complete pattern analysis for each batch before reading the next.
  Read the ENTIRE file — no line limits, no shortcuts.

  # Step 4: Identify patterns

  Analyze each API client class and extract reusable patterns. Focus on:

  ## Port Implementation & Domain Isolation Patterns
  Focus on: Which application layer outbound port is implemented, how HTTP-specific types
  are kept out of the application layer, request/response DTO structures separate from domain.

  ## Request / Response Mapping Patterns
  Focus on: How domain-level parameters become HTTP requests, how HTTP responses are converted
  to domain objects, partial response handling, 404/empty handling.

  ## Retry & Circuit Breaker Patterns
  Focus on: Retry max attempts, backoff strategy, retriable vs. non-retriable HTTP status codes,
  circuit breaker mechanism and threshold configuration, open-state fallback.

  ## Authentication Propagation Patterns
  Focus on: Bearer token / API key / OAuth2 mechanism, token source (SecurityContext, dedicated
  provider), header injection approach (interceptor, per-request), token refresh strategy.

  ## Error Translation Patterns
  Focus on: HTTP status code to domain exception mapping, timeout and network error handling,
  how infrastructure exceptions are prevented from leaking to the application layer.

  For each pattern found:
  - Assign a unique pattern ID following the format:
    - `API-MAP-XX` for request/response mapping and domain translation patterns
    - `API-RTY-XX` for retry and circuit breaker patterns
    - `API-AUTH-XX` for authentication and token propagation patterns
    - `API-ERR-XX` for error handling and HTTP status translation patterns
    - `API-TMO-XX` for timeout and resilience configuration patterns
  - Write a descriptive pattern name capturing the architectural intent
  - Extract a GOOD code example verbatim from the source file (use real code, not invented)
  - Derive an anti-pattern (BAD) counterexample that illustrates the violation of the pattern
  - Record the source file name and class index identifier from the manifest
  - For classes flagged as "Possible outsider" (✓), document why the class may not belong in its
    current layer and include it as an anti-pattern entry

  # Step 5: Fill in the template

  Replace every `{{Variable}}` in the loaded template with content derived from the codebase analysis.
  The template's own "Usage Instructions" and "Template Variables Reference" sections describe exactly
  what each variable expects — follow them. Use the verbatim code extracted in Step 4, substituting
  domain-specific names with generic equivalents (Order, User, Product, Payment) while preserving
  the structure and logic exactly — only the names change.
  Build the HTTP status to domain exception mapping table from real exception handling found in the code.
  Document the actual HTTP client library, retry policy, circuit breaker, auth mechanism, and timeouts.
  Anti-patterns for "Possible outsider" entries come from the manifest's Possible outsider column (✓).

  # Step 6: Write the output file

  - Write the completed document to {{manifest_path}}/wow/ddd-api-client-wow.md
  - Strip everything from "Template Variables Reference" onward — the final file must contain
    no template instructions
