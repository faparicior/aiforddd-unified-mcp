name: create-integration-service-initial-wow
description: >
  Generate the first Integration Service WoW document from an initial chunk of source files
  pre-selected by the CLI. The CLI provides the file list as files_json so this
  prompt never queries the manifest for primary Integration Service classes.
  Adjacent collaborators and cross-cutting classes are still discovered reactively.
arguments:
  - name: manifest_path
    required: true
  - name: output_file
    required: true
  - name: total_files
    required: true
  - name: chunk_total
    required: true
  - name: files_json
    required: true
messages: |
  You are to analyze the first batch of Integration Service source files and produce a
  DDD Infrastructure Layer - Integration Services Way of Working (WoW) document.

  This is chunk 1 of {{chunk_total}} total chunks. If {{chunk_total}} > 1, subsequent
  chunks will enrich this document with additional patterns — do NOT wait for them.
  Write a complete, useful document now using only the files in this chunk plus any
  adjacent collaborators you discover while reading them.

  Total Integration Service files across all chunks: {{total_files}}
  Document path: {{manifest_path}}/wow/{{output_file}}

  Note: For API Clients (Feign/HTTP clients) use create-api-client-wow.
  For Repositories use create-repository-wow.
  For Configuration classes use create-configuration-wow.
  This prompt covers Infrastructure Integration Services — RowMappers, result mappers, metrics
  services, event processing wrappers, and other supporting infrastructure components that
  bridge between infrastructure mechanisms and domain/application concerns.

  Follow these steps precisely.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-integration-service-wow.md".
  Keep it in context — it provides the schema, pattern ID conventions, and variable
  definitions. You will fill every variable in it during Step 4.

  # Step 1: Review this chunk's Integration Service classes

  The following Integration Service classes have been pre-selected for this chunk (JSON array):
  {{files_json}}

  Parse this JSON array. Each object contains:
  - File: source file path relative to the repository root
  - Identifier: unique class identifier from the manifest
  - Category: the class category
  - Layer: the architectural layer
  - Possible outsider: "✓" if flagged as a candidate anti-pattern, empty otherwise

  If the array is empty, write the output file with a note that no Integration Service classes
  were found, and stop.

  Record all entries — you will need File and Identifier for each.
  Note any entries where "Possible outsider" is "✓".

  # Step 2: Read source files

  Construct absolute file paths as: {{manifest_path}}/../<File value>
  (manifest_path points to .aiforddd; source files are relative to the repo root above it)

  ## Proactive cross-cutting discovery
  Before reading any integration service file, query the manifest for classes in the Infrastructure Layer
  that are NOT Integration Services and have not been processed — these may be repositories,
  configuration classes, or event producers that integration services support.

  Call `get_multiple_rows_by_multiple_columns` with
    filters = { "Layer": "Infrastructure Layer" },
    excludeFilters = { "Category": "Integration service", "Processed": "✓" },
    selectColumns = ["Identifier", "Class", "File", "Category", "Description"]

  For each class returned:
  1. Construct the absolute path as: {{manifest_path}}/../<File value>
  2. Add it to the reading batch alongside the integration service files.
  3. Record its Identifier and file path in the Pattern Index and Coverage Summary.
  Do NOT mark these classes as processed — they will be covered by their own WoW document.

  If the call returns nothing, continue — the absence of such classes is itself informative.

  Process all files (integration services from Step 1 + cross-cutting classes) in batches of 6–8 per
  `read_multiple_files_compressed` call.
  Complete pattern analysis for each batch before reading the next.
  Read the ENTIRE file — no line limits, no shortcuts.

  ## Adjacent collaborator discovery
  While reading each integration service file, note any directly referenced classes that are NOT in
  the batch but are relevant to understanding the service's behaviour — for example:
  - A repository that uses this mapper/service
  - A domain entity the mapper reconstructs
  - An event consumer that delegates to this service
  - A metrics interface the service implements

  For each such class found:
  1. Call `get_first_row_by_column` on {{manifest_path}}/code-manifest.md with
     `columnName = "Class"` and the class name as `value` to retrieve its manifest row,
     including its `File` path and `Identifier`.
  2. If not found in the manifest, skip — do not search the filesystem directly.
  3. Construct the absolute path as: {{manifest_path}}/../<File value from manifest row>
  4. Call `read_multiple_files_compressed` on that path to read the file.
  5. Include its patterns in the analysis as if it were part of the batch.
  6. Record its Identifier and file path in the Pattern Index and Coverage Summary.
  Do NOT mark these classes as processed — they will be covered by their own WoW document.

  # Step 3: Identify patterns

  Analyze each integration service class and extract reusable patterns. Focus on:

  ## Result Mapper Patterns
  Focus on: Data source result mapper implementations, data source result to domain object translation, null-safe field
  extraction, date/time type mapping, identifier parsing from strings,
  how composite domain objects are assembled from flat result sets.

  ## Data Transformation Patterns
  Focus on: How external data shapes (API responses, DB rows, event payloads) are mapped into domain
  models, aggregation logic within mappers (grouping rows by key, pre-computing lookup maps),
  period/range clamping, source breakdown extraction.

  ## Metrics & Observability Patterns
  Focus on: Counter/timer registration and increment patterns, tag/dimension strategies (event name,
  result, reason), namespace conventions, how metrics are scoped to specific event lifecycle stages
  (received, processed, rejected, failed), interface vs. implementation separation.

  ## Event Processing Support Patterns
  Focus on: Shared wrappers around event processing logic (try/catch classification: retryable vs
  non-retryable), metric recording integration, reuse across multiple consumers, how domain
  exceptions are translated to infrastructure decisions (reject, retry, DLQ).

  ## Utility & Extension Patterns
  Focus on: Extension methods or utility functions on infrastructure types,
  shared parsing utilities used across multiple consumers, validation helpers that protect
  domain layer from infrastructure-specific types.

  For each pattern found:
  - Assign a unique pattern ID following the format:
    - `SVC-MAP-XX` for result mapper patterns
    - `SVC-TRN-XX` for data transformation and aggregation patterns
    - `SVC-MET-XX` for metrics and observability patterns
    - `SVC-EVT-XX` for event processing support patterns
    - `SVC-UTL-XX` for utility and extension function patterns
  - Write a descriptive pattern name capturing the architectural intent
  - Extract a GOOD code example from the source file — copy the structure and logic exactly, but IMMEDIATELY replace every domain-specific class name, method name, field name, enum value, and identifier with a generic equivalent (Order, User, Product, Payment, Item, Customer). NO real names from the codebase may appear in the example.
  - Derive an anti-pattern (BAD) counterexample that illustrates the violation of the pattern
  - Record the source file name and Identifier from the manifest
  - For classes flagged as "Possible outsider" (✓), document why the class may not belong in its
    current layer and include it as an anti-pattern entry

  # Step 4: Write the document

  Replace every `{{Variable}}` in the loaded template with content derived from the analysis.
  Follow the template's own "Usage Instructions" and "Template Variables Reference" sections
  exactly — they are authoritative for what each section expects.

  Use the generic code produced in Step 3 directly — all names are already generic. Preserve
  the structure and logic exactly as-is.
  Document the RowMapper patterns, metrics namespace and tagging strategy, event processing
  wrapper design, and how shared utilities prevent duplication across consumers.
  Anti-patterns for "Possible outsider" entries come from the manifest's Possible outsider column (✓).

  For the Coverage Summary: use {{total_files}} as the total class count.
  For classes analyzed in this chunk: show the actual count from the parsed JSON array.

  If {{chunk_total}} > 1, add this note at the very end of the document (before any appendix):

  > **Note**: This document was generated from chunk 1/{{chunk_total}} of the codebase.
  > It will be enriched with additional patterns from the remaining chunks.

  Write the completed document to {{manifest_path}}/wow/{{output_file}}.
  Strip everything from "Template Variables Reference" onward — the final file must contain
  no template instructions.

  # Step 5: Mark classes as processed

  For every Integration Service class from the JSON array in Step 1, call `update_row_by_column` using
  the Identifier value to mark the Processed column with ✓. Process all classes — do not skip any.
  Do NOT mark adjacent collaborator classes or cross-cutting classes discovered in Step 2 —
  those will be processed by their own dedicated WoW document.

  # Step 6: Verify

  Read {{manifest_path}}/wow/{{output_file}} and confirm:
  - The document is complete and valid.
  - All patterns are in the correct sections.
  - No template instructions remain in the file.
