name: create-infra-adapter-initial-wow
description: >
  Generate the first Adapter WoW document from an initial chunk of source files
  pre-selected by the CLI.
arguments:
  - name: manifest_path
    required: true
  - name: output_file
    required: true
  - name: total_files
    required: true
  - name: chunk_total
    required: true
  - name: files_json
    required: true
messages: |
  You are to analyze the first batch of Adapter source files and produce a
  DDD Infrastructure Layer - Adapters Way of Working (WoW) document.

  This is chunk 1 of {{chunk_total}} total chunks. If {{chunk_total}} > 1, subsequent
  chunks will enrich this document with additional patterns — do NOT wait for them.

  Total Adapter files across all chunks: {{total_files}}
  Document path: {{manifest_path}}/wow/{{output_file}}

  Note: Adapters wrap external systems or libraries to conform to a domain interface contract
  (anti-corruption layer). They belong to the Infrastructure Layer, implementing domain ports.
  Do not confuse with API clients (HTTP-specific) or Gateways (multi-API aggregators).

  Follow these steps precisely.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-infra-adapter-wow.md".

  # Step 1: Review this chunk's Adapter classes

  Parse JSON array: {{files_json}}. Each object: File, Identifier, Category, Layer, Possible outsider.
  If empty, write a note and stop.

  # Step 2: Read source files

  Paths: {{manifest_path}}/../<File value>

  ## Proactive cross-cutting discovery
  Call `get_multiple_rows_by_multiple_columns` with
    filters = { "Layer": "Infrastructure Layer" },
    excludeFilters = { "Category": "Adapter", "Processed": "✓" },
    selectColumns = ["Identifier", "Class", "File", "Category", "Description"]

  Add to batch, record in AdjacentCollaborators. Do NOT mark as processed.
  Process in batches of 6–8 per `read_multiple_files_compressed`. Read ENTIRE files.

  ## Adjacent collaborator discovery
  For referenced classes not in batch (domain interfaces implemented, external libs wrapped):
  1. `get_first_row_by_column` col "Class". If not found, skip.
  2. Read and include. Record in AdjacentCollaborators.

  # Step 3: Identify patterns

  ## Wrapper Patterns
  Focus on: How external libraries/SDKs are wrapped, the anti-corruption layer contract,
  adapter class naming conventions (*Adapter, *Bridge, *Impl).

  ## Translation Patterns
  Focus on: How external types are translated to/from domain types, handling format differences,
  vocabulary translation between external API and domain language.

  ## Error Mapping Patterns
  Focus on: How external exceptions are caught and re-thrown as domain or infrastructure exceptions,
  wrapping vs. translating exceptions, error code mapping.

  ## Port Implementation Patterns
  Focus on: How adapters implement domain port interfaces, single-responsibility per port,
  constructor injection of external clients/connections.

  ## Testing Patterns
  Focus on: How adapters are tested (integration tests, test doubles for external system,
  recorded/playback testing, contract tests).

  For each pattern:
  - IDs: ADT-WRP-XX, ADT-TRN-XX, ADT-ERR-XX, ADT-PRT-XX, ADT-TST-XX
  - Descriptive name, GOOD + BAD examples with generic names, source file + identifier
  - "Possible outsider" as anti-pattern if applicable

  # Step 4: Write the document

  Fill every `{{Variable}}` in the template. Use {{total_files}} as total.

  If {{chunk_total}} > 1:
  > **Note**: This document was generated from chunk 1/{{chunk_total}}. It will be enriched.

  Write to {{manifest_path}}/wow/{{output_file}}. Strip template instructions.

  # Step 5: Verify

  Confirm document complete, patterns correct, no template instructions.
