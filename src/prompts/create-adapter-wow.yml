name: create-adapter-wow
description: Analyze Adapter patterns in a code manifest and generate a DDD Infrastructure Layer Adapter WoW document
arguments:
  - name: manifest_path
    required: true
messages: |
  You are to analyze Adapter patterns from a code manifest located at: {{manifest_path}}/code-manifest.md
  and produce a DDD Infrastructure Layer - Adapters Way of Working (WoW) document.

  The output file must be written to: {{manifest_path}}/wow/ddd-adapter-wow.md

  Note: Adapters wrap external systems to conform to domain interface contracts (anti-corruption layer).
  They implement domain port interfaces and belong to the Infrastructure Layer.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-adapter-wow.md".

  # Step 1: Assess the manifest

  - `filter_and_count_rows`: Layer = "Infrastructure Layer", Category = "Adapter", excludeFilters Processed ✓
  - If 0, write note and stop. Record count.

  # Step 2: Collect all relevant classes

  - `get_multiple_rows_by_multiple_columns` with filters = { "Layer": "Infrastructure Layer", "Category": "Adapter" }, excludeFilters = { "Processed": "✓" }, selectColumns = ["Identifier", "Class", "File", "Possible outsider"]
  - If empty, write note and stop.

  # Step 3: Read source files

  Paths: {{manifest_path}}/../<File value>. Batches of 6–8, full files.

  ## Cross-cutting discovery
  Query Infrastructure Layer non-Adapter classes. Add to batch, record in AdjacentCollaborators.

  ## Adjacent collaborator discovery
  For referenced domain interfaces, external library types, or implementing classes:
  1. Look up via `get_first_row_by_column`. 2. Read. 3. Record.

  # Step 4: Identify patterns

  ## Wrapper Patterns — external library wrapping, ACL contract, naming conventions
  ## Translation Patterns — type translation, format differences, vocabulary mapping
  ## Error Mapping Patterns — exception wrapping, domain error translation, error codes
  ## Port Implementation Patterns — port interface compliance, single-responsibility, DI
  ## Testing Patterns — integration tests, test doubles, contract tests

  Pattern IDs: ADT-WRP-XX, ADT-TRN-XX, ADT-ERR-XX, ADT-PRT-XX, ADT-TST-XX
  GOOD + BAD examples with generic names. Source + identifier.

  # Step 5: Fill in the template

  # Step 6: Write output

  Write to {{manifest_path}}/wow/ddd-adapter-wow.md. Strip template instructions.
