name: create-policy-wow
description: Analyze Policy patterns in a code manifest and generate a DDD Domain Layer Policy WoW document
arguments:
  - name: manifest_path
    required: true
messages: |
  You are to analyze Policy patterns from a code manifest located at: {{manifest_path}}/code-manifest.md
  and produce a DDD Domain Layer - Policies Way of Working (WoW) document.

  The output file must be written to: {{manifest_path}}/wow/ddd-policy-wow.md

  Note: Policies encapsulate changeable business decisions or strategies that vary by context,
  replacing conditional logic with polymorphism (Strategy pattern). They belong to the Domain Layer.

  Follow these steps to produce a high-quality, pattern-rich WoW document.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-policy-wow.md" to retrieve
  the full template. Keep it in context — you will fill every variable in it during Step 5.

  # Step 1: Assess the manifest

  - Call `filter_and_count_rows` with `columnName = "Layer"`, `value = "Domain Layer"`, `extraFilters = { "Category": "Policy" }`, `excludeFilters = { "Processed": "✓" }` to count unprocessed Policy classes
  - If the call fails, stop immediately and report the error
  - If the count is 0, write the output file with a note that no classes were found, then stop
  - Record the count; it determines the retrieval strategy in Step 2

  # Step 2: Collect all relevant classes

  - Retrieve all unprocessed Policy classes via `get_multiple_rows_by_multiple_columns`
    with filters = { "Layer": "Domain Layer", "Category": "Policy" }, excludeFilters = { "Processed": "✓" },
    and selectColumns = ["Identifier", "Class", "File", "Possible outsider"]
  - If the result is empty, write a note to the output file stating all classes are already documented, then stop
  - Note all classes where the "Possible outsider" column is marked (✓)

  # Step 3: Read source files

  Construct absolute file paths as: {{manifest_path}}/../<File column value from manifest>

  Process source files in batches of 6–8 files per `read_multiple_files_compressed` call.
  Complete pattern analysis for each batch before reading the next.
  Read the ENTIRE file — no line limits, no shortcuts.

  ## Proactive cross-cutting discovery
  Before reading policy files, query other Domain Layer classes to understand where
  policies are injected and how they are used.

  Call `get_multiple_rows_by_multiple_columns` with
    filters = { "Layer": "Domain Layer" },
    excludeFilters = { "Category": "Policy", "Processed": "✓" },
    selectColumns = ["Identifier", "Class", "File", "Category", "Description"]

  For each class returned:
  1. Construct the absolute path as: {{manifest_path}}/../<File value>
  2. Add it to the reading batch alongside the policy files.
  3. Record its Identifier and file path in the AdjacentCollaborators list of the Coverage Summary,
     using the format: `- [Identifier] FileName.kt _(adjacent collaborator)_`.
  Do NOT mark these classes as processed.

  ## Adjacent collaborator discovery
  While reading each policy file, note any directly referenced classes that are NOT in
  the batch — for example:
  - Domain services or entities that inject and use these policies
  - Companion policies that form a policy family
  - Configuration or infrastructure that selects the active policy at runtime

  For each such class found:
  1. Call `get_first_row_by_column` on {{manifest_path}}/code-manifest.md with
     `columnName = "Class"` and the class name as `value`.
  2. If not found, skip.
  3. Read and include in analysis.
  4. Record its Identifier and file path in the AdjacentCollaborators list.
  Do NOT mark these classes as processed.

  # Step 4: Identify patterns

  Analyze each policy class and extract reusable patterns. Focus on:

  ## Policy Definition Patterns
  Focus on: Interface naming, method naming conventions (calculate, evaluate, apply, determine),
  use of domain objects in method signatures.

  ## Strategy & Injection Patterns
  Focus on: How policy variants are injected, how the correct variant is selected at runtime,
  grouping by interface family.

  ## Policy Injection Patterns
  Focus on: Constructor injection, default policy fallbacks, null object patterns.

  ## Evolution Patterns
  Focus on: New variants, deprecated variants, backward compatibility, versioned interfaces.

  ## Evaluation & Lifecycle Patterns
  Focus on: Stateless vs. stateful, thread-safety, caching, composition and chaining.

  For each pattern found:
  - Assign a unique pattern ID:
    - `POL-DEF-XX` for definition and interface patterns
    - `POL-STG-XX` for strategy and injection patterns
    - `POL-INJ-XX` for injection and wiring patterns
    - `POL-EVO-XX` for evolution and versioning patterns
    - `POL-EVL-XX` for evaluation, lifecycle, and composition patterns
  - Write a descriptive pattern name
  - Extract a GOOD code example — replace all domain-specific names with generic equivalents
  - Derive an anti-pattern (BAD) counterexample
  - Record source file and identifier
  - For "Possible outsider" classes (✓), document and include as anti-pattern

  # Step 5: Fill in the template

  Replace every `{{Variable}}` in the loaded template with content derived from the analysis.

  # Step 6: Write the output file

  - Write the completed document to {{manifest_path}}/wow/ddd-policy-wow.md
  - Strip everything from "Template Variables Reference" onward
