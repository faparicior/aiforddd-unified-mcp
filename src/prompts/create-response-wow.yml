name: create-response-wow
description: Analyze Response DTO patterns in a code manifest and generate a DDD Response WoW document covering Application and UI layers
arguments:
  - name: manifest_path
    required: true
messages: |
  You are to analyze Response DTO patterns from a code manifest located at: {{manifest_path}}/code-manifest.md
  and produce a DDD Response Way of Working (WoW) document covering both Application and User Interface layers.

  The output file must be written to: {{manifest_path}}/wow/ddd-response-wow.md

  Note: For REST Controllers (which produce responses) use create-controller-wow.
  For Integration Event DTOs (inbound) use create-integration-event-wow.
  This prompt focuses on the outbound Response DTO classes returned from use cases and controllers.

  Follow these steps to produce a high-quality, pattern-rich WoW document.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-response-wow.md" to retrieve
  the full template. Keep it in context — you will fill every variable in it during Step 5.

  # Step 1: Assess the manifest

  - Call `filter_and_count_rows` with `columnName = "Layer"`, `value = "User Interface Layer"`, `extraFilters = { "Category": "Response" }`, `excludeFilters = { "Processed": "✓" }` to count unprocessed Response classes in the User Interface Layer
  - Call `filter_and_count_rows` with `columnName = "Layer"`, `value = "Application Layer"`, `extraFilters = { "Category": "Response" }`, `excludeFilters = { "Processed": "✓" }` to count unprocessed Response classes in the Application Layer
  - If either call fails, stop immediately and report the error — do not infer counts from retrieval results
  - If the total count is 0, do not search for alternatives or classes in other layers/categories.
    Write the output file with a note stating that no classes were found for the expected layer/categories,
    and that the developer must ensure the manifest is catalogued correctly before running this prompt again.
    Then stop — do not proceed to Step 2.
  - Record both counts; the total determines the retrieval strategy in Step 2

  # Step 2: Collect all relevant classes

  - Retrieve all unprocessed Response classes via two `get_multiple_rows_by_multiple_columns` calls:
    - filters = { "Layer": "User Interface Layer", "Category": "Response" }, excludeFilters = { "Processed": "✓" }, selectColumns = ["Class name", "File", "Possible outsider"]
    - filters = { "Layer": "Application Layer", "Category": "Response" }, excludeFilters = { "Processed": "✓" }, selectColumns = ["Class name", "File", "Possible outsider"]
  - Combine both result sets into a single working set for analysis
  - If the combined result is empty, write a note to the output file stating all classes are already documented, then stop
  - Focus exclusively on: Response category in both User Interface and Application layers
  - Note all classes where the "Possible outsider" column is marked (✓) — these are candidate
    anti-pattern examples for the Anti-Patterns section of the document

  # Step 3: Read source files

  Construct absolute file paths as: {{manifest_path}}/../<File column value from manifest>
  (the manifest_path points to the .aiforddd directory; source files are relative to the repo root above it)

  Process source files in batches of 6–8 files per `read_multiple_files_compressed` call regardless
  of codebase size. Complete pattern analysis for each batch before reading the next.
  Read the ENTIRE file — no line limits, no shortcuts.

  # Step 4: Identify patterns

  Analyze each response class and extract reusable patterns. Focus on:

  ## Domain-to-Response Mapping Patterns
  Focus on: Factory/companion object methods that construct responses from domain objects
  (fromDomain(), of(), toResponse()), field selection strategy (what is included vs. omitted),
  how domain value objects are flattened to primitives.

  ## Response Structure Patterns
  Focus on: Flat vs. nested response structures, list/collection wrapping, pagination envelopes,
  optional fields handling, how related data is grouped in the response shape.

  ## Serialization Patterns
  Focus on: Serialization annotations or decorators (e.g. @JsonProperty, @JsonInclude, @JsonFormat or equivalent),
  date/time formatting conventions, null field handling (include vs. exclude), enum serialization.

  ## Layer-Specific Response Patterns
  Focus on: Differences between Application Layer responses (used by UI layer) and User Interface
  Layer responses (returned to external clients), response DTO inheritance or composition patterns.

  ## Derived Field Patterns
  Focus on: Computed fields derived from multiple domain values (e.g. lists = listings + minisites),
  formatting transformations, how business display rules are encoded in the response.

  For each pattern found:
  - Assign a unique pattern ID following the format:
    - `RSP-MAP-XX` for domain-to-response mapping patterns
    - `RSP-STR-XX` for response structure patterns
    - `RSP-SER-XX` for serialization annotation patterns
    - `RSP-LYR-XX` for layer-specific response patterns
    - `RSP-DRV-XX` for derived and computed field patterns
  - Write a descriptive pattern name capturing the architectural intent
  - Extract a GOOD code example from the source file — copy the structure and logic exactly, but IMMEDIATELY replace every domain-specific class name, method name, field name, enum value, and identifier with a generic equivalent (Order, User, Product, Payment, Item, Customer). NO real names from the codebase may appear in the example.
  - Derive an anti-pattern (BAD) counterexample that illustrates the violation of the pattern
  - Record the source file name and class index identifier from the manifest
  - For classes flagged as "Possible outsider" (✓), document why the class may not belong in its
    current layer and include it as an anti-pattern entry

  # Step 5: Fill in the template

  Replace every `{{Variable}}` in the loaded template with content derived from the codebase analysis.
  The template's own "Usage Instructions" and "Template Variables Reference" sections describe exactly
  what each variable expects — follow them. Use the generic code produced in Step 4 directly —
  all names are already generic. Preserve
  the structure and logic exactly as-is.
  Document the mapping strategy from domain to response, the serialization approach, and how the
  Application and UI layer response DTOs differ in responsibility.
  Anti-patterns for "Possible outsider" entries come from the manifest's Possible outsider column (✓).

  # Step 6: Write the output file

  - Write the completed document to {{manifest_path}}/wow/ddd-response-wow.md
  - Strip everything from "Template Variables Reference" onward — the final file must contain
    no template instructions

  # Step 7: Mark classes as processed

  For every class retrieved in Step 2, call `update_row_by_column` using the Identifier column value
  to mark the Processed column with ✓. Process all classes — do not skip any.
