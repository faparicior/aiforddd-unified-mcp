name: generate-manifest
description: Generates a code manifest
arguments:
  - name: config_path
    required: true
messages: |
  Call `mcp__code-manifest__generate_manifest` to generate a code manifest using the configuration file at: {{config_path}}. The config contains app_details with paths to code sources and a destination_folder for output.
  The "generatedFiles" response will have two generated files by the mcp-code-manifest tool. This values will be used for further processing in the MCP pipeline.
  This is an example:
  {
    "generatedFiles": [
      {
        "type": "code_manifest",
        "path": "<path>/code_manifest.md"
      },
      {
        "type": "tests_manifest",
        "path": "<path>/tests_manifest.md"
      }
    ],
    "message": "Manifests generated successfully"
  }
  Ensure the output JSON is properly formatted and includes the paths to the generated manifests.

