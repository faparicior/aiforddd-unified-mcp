name: create-entity-wow
description: Analyze Entity patterns in a code manifest and generate a DDD Domain Layer Entity WoW document
arguments:
  - name: manifest_path
    required: true
messages: |
  You are to analyze Entity patterns from a code manifest located at: {{manifest_path}}/code-manifest.md
  and produce a DDD Domain Layer - Entities Way of Working (WoW) document.

  The output file must be written to: {{manifest_path}}/wow/ddd-entity-wow.md

  Note: For Aggregate Roots use the dedicated aggregate prompt if available.
  For Value Objects use create-value-object-wow. This prompt focuses on Entities and their patterns.

  Follow these steps to produce a high-quality, pattern-rich WoW document.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-entity-wow.md" to retrieve
  the full template. Keep it in context — you will fill every variable in it during Step 5.

  # Step 1: Assess the manifest

  - Call `filter_and_count_rows` to count Entity classes in the Domain Layer
    (Layer = "Domain Layer", Category = "Entity")
  - If the call fails, stop immediately and report the error — do not infer counts from retrieval results
  - If the count is 0, do not search for alternatives or classes in other layers/categories.
    Write the output file with a note stating that no classes were found for the expected layer/category,
    and that the developer must ensure the manifest is catalogued correctly before running this prompt again.
    Then stop — do not proceed to Step 2.
  - Record the count explicitly; it determines the retrieval strategy in Step 2

  # Step 2: Collect all relevant classes

  Use the count from Step 1 to plan retrieval:
  - If the layer has ≤ 30 classes: retrieve all in a single `get_multiple_rows_by_column` call
    with maxRows set to the count from Step 1
  - If the layer has > 30 classes: retrieve in sequential batches of 20, incrementing the offset
    until the total retrieved equals the Step 1 count
  - Verify: the sum of all retrieved rows must equal the Step 1 count before proceeding
  - Focus exclusively on: Entity category in the Domain Layer
  - Note all classes where the "Possible outsider" column is marked (✓) — these are candidate
    anti-pattern examples for the Anti-Patterns section of the document

  # Step 3: Read source files

  Construct absolute file paths as: {{manifest_path}}/../<File column value from manifest>
  (the manifest_path points to the .aiforddd directory; source files are relative to the repo root above it)

  Process source files in batches of 6–8 files per `read_multiple_files_compressed` call regardless
  of codebase size. Complete pattern analysis for each batch before reading the next.
  Read the ENTIRE file — no line limits, no shortcuts.

  # Step 4: Identify patterns

  Analyze each entity class and extract reusable patterns. Focus on:

  ## Identity Patterns
  Focus on: How entity identity is defined (UUID, Long, composite key), how identity-based equality
  is implemented (equals/hashCode), value object wrappers for IDs, identity generation strategies.

  ## Lifecycle & State Transition Patterns
  Focus on: State machine design, valid state transitions, how invalid transitions are rejected,
  methods that advance entity state, lifecycle hooks (onCreate, onUpdate equivalents).

  ## Invariant Enforcement Patterns
  Focus on: Constructor validation with require/check, init blocks, how entities protect themselves
  from invalid state at creation time, which invariants are enforced vs. delegated to domain services.

  ## Behavior Patterns
  Focus on: Methods on the entity that encode domain behavior (not just getters/setters),
  soft-delete patterns (markAsRemoved, deactivate), domain event emission from entity methods,
  self-encapsulation of business rules.

  ## Factory & Reconstruction Patterns
  Focus on: Static factory methods (companion object), factory classes, how entities are
  reconstructed from persistence (fromPersistence pattern), builder patterns if present.

  For each pattern found:
  - Assign a unique pattern ID following the format:
    - `ENT-IDN-XX` for identity definition and equality patterns
    - `ENT-LCY-XX` for lifecycle and state transition patterns
    - `ENT-INV-XX` for invariant enforcement patterns
    - `ENT-BHV-XX` for behavior and business rule patterns
    - `ENT-FAC-XX` for factory and reconstruction patterns
  - Write a descriptive pattern name capturing the architectural intent
  - Extract a GOOD code example verbatim from the source file (use real code, not invented)
  - Derive an anti-pattern (BAD) counterexample that illustrates the violation of the pattern
  - Record the source file name and class index identifier from the manifest
  - For classes flagged as "Possible outsider" (✓), document why the class may not belong in its
    current layer and include it as an anti-pattern entry

  # Step 5: Fill in the template

  Replace every `{{Variable}}` in the loaded template with content derived from the codebase analysis.
  The template's own "Usage Instructions" and "Template Variables Reference" sections describe exactly
  what each variable expects — follow them. Use the verbatim code extracted in Step 4, substituting
  domain-specific names with generic equivalents (Order, User, Product, Payment) while preserving
  the structure and logic exactly — only the names change.
  Document the identity strategy, state machine design, and how invariants are enforced.
  Anti-patterns for "Possible outsider" entries come from the manifest's Possible outsider column (✓).

  # Step 6: Write the output file

  - Write the completed document to {{manifest_path}}/wow/ddd-entity-wow.md
  - Strip everything from "Template Variables Reference" onward — the final file must contain
    no template instructions

  # Step 7: Mark classes as processed

  For every class retrieved in Step 2, call `update_row_by_column` using the Identifier column value
  to mark the Processed column with ✓. Process all classes — do not skip any.
