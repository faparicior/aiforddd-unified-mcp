name: generate-initial-wow
description: Generate the first WoW document from an initial chunk of source files, using the type-specific template. Later chunks will enrich this document incrementally.
arguments:
  - name: manifest_path
    required: true
  - name: wow_type
    required: true
  - name: output_file
    required: true
  - name: total_files
    required: true
  - name: chunk_total
    required: true
  - name: files_json
    required: true
messages: |
  You are to analyze the first batch of source files for a "{{wow_type}}" WoW document and produce
  an initial Way of Working (WoW) document using the type-specific template.

  This is chunk 1 of {{chunk_total}} total chunks. If {{chunk_total}} > 1, subsequent chunks will
  enrich this document with additional patterns — do NOT wait for them. Write a complete, useful
  document now using only the files in this chunk.

  Total files across all chunks: {{total_files}}
  Output file: {{manifest_path}}/wow/{{output_file}}

  Follow these steps precisely.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-{{wow_type}}-wow.md" to retrieve
  the full template. Keep it in context — you will fill every variable in it during Step 3.

  # Step 1: Review this chunk's files

  The following classes have been pre-selected for this initial chunk (JSON array):
  {{files_json}}

  Parse this JSON array. Each object contains:
  - File: source file path relative to the repository root
  - Identifier: unique class identifier from the manifest
  - Category: the class category
  - Layer: the architectural layer
  - Possible outsider: "✓" if flagged as a candidate anti-pattern, empty otherwise

  If the array is empty, write the output file with a note that no classes were found,
  and stop.

  # Step 2: Read source files

  Construct absolute file paths as: {{manifest_path}}/../<File value>
  (manifest_path points to .aiforddd; source files are relative to the repo root above it)

  ## Proactive cross-cutting discovery
  Before reading primary source files, determine the primary Layer and Category from the
  first entry in the JSON array. Then query the manifest for classes in the same layer
  that are NOT of the primary category and have not been processed — these are cross-cutting
  concerns (e.g., global exception handlers, shared validators, infrastructure helpers) that
  affect all classes in the layer.

  Call `get_multiple_rows_by_multiple_columns` with
    filters = { "Layer": "<primary Layer from Step 1>" },
    excludeFilters = { "Category": "<primary Category from Step 1>", "Processed": "✓" },
    selectColumns = ["Identifier", "Class", "File", "Category", "Description"]

  For each class returned:
  1. Construct the absolute path as: {{manifest_path}}/../<File value>
  2. Add it to the reading batch alongside the primary source files.
  3. Record its Identifier and file path in the Pattern Index and Coverage Summary.
  Do NOT mark these classes as processed — they will be covered by their own WoW document.

  If the call returns nothing, continue — the absence of such classes is itself informative.

  Process all files (primary + cross-cutting) in batches of 6–8 per `read_multiple_files_compressed` call.
  Complete pattern analysis for each batch before reading the next.
  Read the ENTIRE file — no line limits, no shortcuts.

  ## Adjacent collaborator discovery
  While reading each source file, note any directly referenced classes that are NOT in
  the batch but are relevant to understanding the file's behaviour — for example a base
  class, an interface, a composed type, or a cross-cutting concern.

  For each such class found:
  1. Call `get_first_row_by_column` on {{manifest_path}}/code-manifest.md with
     `columnName = "Class"` and the class name as `value` to retrieve its manifest row,
     including its `File` path and `Identifier`.
  2. If not found in the manifest, skip — do not search the filesystem directly.
  3. Construct the absolute path as: {{manifest_path}}/../<File value from manifest row>
  4. Call `read_multiple_files_compressed` on that path to read the file.
  5. Include its patterns in the analysis as if it were part of the batch.
  6. Record its Identifier and file path in the Pattern Index and Coverage Summary.
  Do NOT mark these classes as processed — they will be covered by their own WoW document.

  # Step 3: Identify patterns and fill the template

  Analyze each file and extract reusable patterns organically. For each pattern:
  - Assign a unique pattern ID following the template's conventions
  - Write a descriptive name capturing the architectural intent
  - Extract a GOOD code example — copy structure and logic exactly, but IMMEDIATELY replace
    every domain-specific name with a generic equivalent (Order, User, Product, Payment, Item, Customer).
    NO real names from the codebase may appear in examples.
  - Derive an anti-pattern (BAD) counterexample
  - Record the source file name and Identifier

  For "Possible outsider" (✓) entries, document why the class may not belong in its layer
  and include it as an anti-pattern entry.

  Replace every `{{Variable}}` in the loaded template with content derived from the analysis.
  Follow the template's own "Usage Instructions" and "Template Variables Reference" sections.

  For the Coverage Summary: use {{total_files}} as the total class count.
  For classes analyzed in this chunk: show the actual count from {{files_json}}.

  If {{chunk_total}} > 1, add this note at the very end of the document (before any appendix):

  > **Note**: This document was generated from chunk 1/{{chunk_total}} of the codebase.
  > It will be enriched with additional patterns from the remaining {{chunk_total}} chunks.

  # Step 4: Write the output file

  - Write the completed document to {{manifest_path}}/wow/{{output_file}}
  - Strip everything from "Template Variables Reference" onward — the final file must contain
    no template instructions
