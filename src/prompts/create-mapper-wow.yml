name: create-mapper-wow
description: Analyze Mapper patterns in a code manifest and generate a DDD Infrastructure Layer Mapper WoW document
arguments:
  - name: manifest_path
    required: true
messages: |
  You are to analyze Mapper patterns from a code manifest located at: {{manifest_path}}/code-manifest.md
  and produce a DDD Infrastructure Layer - Mappers Way of Working (WoW) document.

  The output file must be written to: {{manifest_path}}/wow/ddd-mapper-wow.md

  Note: Mappers transform data between domain objects and external representations.
  They belong to the Infrastructure Layer and must not contain business rules.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-mapper-wow.md".

  # Step 1: Assess the manifest

  - Call `filter_and_count_rows` with `columnName = "Layer"`, `value = "Infrastructure Layer"`, `extraFilters = { "Category": "Mapper" }`, `excludeFilters = { "Processed": "✓" }`
  - If 0, write note and stop. Record count.

  # Step 2: Collect all relevant classes

  - `get_multiple_rows_by_multiple_columns` with filters = { "Layer": "Infrastructure Layer", "Category": "Mapper" }, excludeFilters = { "Processed": "✓" }, selectColumns = ["Identifier", "Class", "File", "Possible outsider"]
  - If empty, write note and stop.

  # Step 3: Read source files

  Paths: {{manifest_path}}/../<File value>. Batches of 6–8, full files.

  ## Cross-cutting discovery
  Query Infrastructure Layer non-Mapper classes:
  filters = { "Layer": "Infrastructure Layer" }, excludeFilters = { "Category": "Mapper", "Processed": "✓" }

  Add to batch, record in AdjacentCollaborators.

  ## Adjacent collaborator discovery
  For each referenced domain entity, DTO, or value object not in the batch:
  1. Look up via `get_first_row_by_column`.
  2. Read and include.
  3. Record in AdjacentCollaborators.

  # Step 4: Identify patterns

  ## Domain Object Mapping Patterns
  Domain entity/value object ↔ DTO transformation, direction conventions.

  ## Persistence Mapping Patterns
  Domain ↔ JPA/JDBC entity, embedded value objects, collection mapping.

  ## Null & Optional Handling Patterns
  Null safety, Optional, fallback defaults.

  ## Complex & Nested Mapping Patterns
  Nested objects, collections, polymorphic mapping, multi-source mapping.

  ## Type Conversion Patterns
  String→value-type, enum, date/time, money conversions.

  Pattern IDs: MAP-DOM-XX, MAP-PRS-XX, MAP-NUL-XX, MAP-CMX-XX, MAP-TYP-XX
  GOOD + BAD examples with generic names. Source file + identifier.

  # Step 5: Fill in the template

  # Step 6: Write output

  Write to {{manifest_path}}/wow/ddd-mapper-wow.md. Strip template instructions.
