name: create-domain-interface-wow
description: Analyze Domain Interface patterns in a code manifest and generate a DDD Domain & Application Layer Domain Interface WoW document
arguments:
  - name: manifest_path
    required: true
messages: |
  You are to analyze Domain Interface patterns from a code manifest located at: {{manifest_path}}/code-manifest.md
  and produce a DDD Domain & Application Layer - Domain Interfaces Way of Working (WoW) document.

  The output file must be written to: {{manifest_path}}/wow/ddd-domain-interface-wow.md

  Note: Domain Interfaces define the contracts (ports) used by the Domain and Application layers
  to depend on infrastructure capabilities without importing infrastructure details.
  They appear in both the Domain Layer (repository and policy ports) and the Application Layer
  (service ports, external service ports). For infrastructure implementations of these ports
  use the Infrastructure Layer WoW documentation.

  Follow these steps to produce a high-quality, pattern-rich WoW document.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-domain-interface-wow.md" to retrieve
  the full template. Keep it in context — you will fill every variable in it during Step 5.

  # Step 1: Assess the manifest

  - Call `filter_and_count_rows` with `columnName = "Layer"`, `value = "Domain Layer"`, `extraFilters = { "Category": "Domain interface" }`, `excludeFilters = { "Processed": "✓" }` to count unprocessed Domain interface classes in the Domain Layer
  - Call `filter_and_count_rows` with `columnName = "Layer"`, `value = "Application Layer"`, `extraFilters = { "Category": "Domain interface" }`, `excludeFilters = { "Processed": "✓" }` to count unprocessed Domain interface classes in the Application Layer
  - If either call fails, stop immediately and report the error
  - If the total count is 0, write the output file with a note that no classes were found, then stop.
  - Record both counts; the total determines the retrieval strategy in Step 2

  # Step 2: Collect all relevant classes

  - Retrieve all unprocessed Domain interface classes via two `get_multiple_rows_by_multiple_columns` calls:
    - filters = { "Layer": "Domain Layer", "Category": "Domain interface" }, excludeFilters = { "Processed": "✓" }, selectColumns = ["Identifier", "Class", "File", "Possible outsider"]
    - filters = { "Layer": "Application Layer", "Category": "Domain interface" }, excludeFilters = { "Processed": "✓" }, selectColumns = ["Identifier", "Class", "File", "Possible outsider"]
  - Combine both result sets into a single working set for analysis
  - If the combined result is empty, write a note to the output file stating all classes are already documented, then stop
  - Note all classes where the "Possible outsider" column is marked (✓)

  # Step 3: Read source files

  Construct absolute file paths as: {{manifest_path}}/../<File column value from manifest>
  (the manifest_path points to the .aiforddd directory; source files are relative to the repo root above it)

  Process source files in batches of 6–8 files per `read_multiple_files_compressed` call regardless
  of codebase size. Complete pattern analysis for each batch before reading the next.
  Read the ENTIRE file — no line limits, no shortcuts.

  ## Proactive cross-cutting discovery
  Before reading domain interface files, query classes in both the Domain Layer and Application Layer
  that are NOT Domain Interfaces to understand what depends on these contracts.

  Call `get_multiple_rows_by_multiple_columns` with
    filters = { "Layer": "Domain Layer" },
    excludeFilters = { "Category": "Domain interface", "Processed": "✓" },
    selectColumns = ["Identifier", "Class", "File", "Category", "Description"]

  Also call `get_multiple_rows_by_multiple_columns` with
    filters = { "Layer": "Application Layer" },
    excludeFilters = { "Category": "Domain interface", "Processed": "✓" },
    selectColumns = ["Identifier", "Class", "File", "Category", "Description"]

  For each class returned from either call:
  1. Construct the absolute path as: {{manifest_path}}/../<File value>
  2. Add it to the reading batch alongside the domain interface files.
  3. Record its Identifier and file path in the AdjacentCollaborators list of the Coverage Summary,
     using the format: `- [Identifier] FileName.kt _(adjacent collaborator)_`.
  Do NOT mark these classes as processed — they will be covered by their own WoW document.

  If the calls return nothing, continue — the absence is itself informative.

  ## Adjacent collaborator discovery
  While reading each domain interface file, note any directly referenced classes that are NOT in
  the batch — for example:
  - Domain entities or value objects used as method parameters/return types
  - Infrastructure implementations of this interface
  - Use cases or domain services that depend on this interface
  - Domain exceptions declared in the interface contract

  For each such class found:
  1. Call `get_first_row_by_column` on {{manifest_path}}/code-manifest.md with
     `columnName = "Class"` and the class name as `value` to retrieve its manifest row.
  2. If not found in the manifest, skip.
  3. Construct the absolute path as: {{manifest_path}}/../<File value from manifest row>
  4. Call `read_multiple_files_compressed` on that path to read the file.
  5. Include its patterns in the analysis.
  6. Record its Identifier and file path in the AdjacentCollaborators list of the Coverage Summary,
     using the format: `- [Identifier] FileName.kt _(adjacent collaborator)_`.
  Do NOT mark these classes as processed.

  # Step 4: Identify patterns

  Analyze each domain interface class and extract reusable patterns. Focus on:

  ## Contract Definition Patterns
  Focus on: Interface naming conventions (Repository, Port, Gateway, Service suffixes),
  method signature design (commands vs. queries), use of domain objects in signatures,
  avoiding infrastructure leakage in the contract.

  ## Dependency Inversion Patterns
  Focus on: How the interface enforces separation between domain logic and infrastructure,
  which layer declares the interface vs. which provides the implementation, module dependency rules.

  ## Implementation Contract Patterns
  Focus on: Expectations placed on implementors (documented invariants, required vs. optional
  operations), default methods, interface inheritance hierarchy.

  ## Interface Naming & Segregation Patterns
  Focus on: How interfaces are divided by responsibility (Interface Segregation Principle),
  coarse-grained vs. fine-grained interfaces, naming conventions across Domain and Application layers.

  ## Layer Placement Patterns
  Focus on: Rules for placing interfaces in Domain Layer vs. Application Layer,
  which domain objects are appropriate in interface signatures, how interfaces avoid
  coupling Domain Layer to Application Layer concerns.

  IMPORTANT — domain interface scope boundary:
  The domain interface WoW covers only the port contract design: naming, method signatures,
  layer placement, dependency inversion, and interface segregation.
  Infrastructure adapter implementations belong in the Infrastructure Layer WoW.
  Add a cross-reference note when encountering out-of-scope patterns.

  For each pattern found:
  - Assign a unique pattern ID following the format:
    - `DI-CON-XX` for contract definition and naming patterns
    - `DI-DEP-XX` for dependency inversion and layer boundary patterns
    - `DI-IMP-XX` for implementation contract and invariant patterns
    - `DI-SEG-XX` for interface naming and segregation patterns
    - `DI-LYR-XX` for layer placement and dependency direction patterns
  - Write a descriptive pattern name capturing the architectural intent
  - Extract a GOOD code example from the source file — copy the structure and logic exactly, but IMMEDIATELY replace every domain-specific class name, method name, field name, enum value, and identifier with a generic equivalent (Order, User, Product, Payment, Item, Customer). NO real names from the codebase may appear in the example.
  - Derive an anti-pattern (BAD) counterexample that illustrates the violation of the pattern
  - Record the source file name and class index identifier from the manifest
  - For classes flagged as "Possible outsider" (✓), document why the class may not belong in its
    current layer and include it as an anti-pattern entry

  # Step 5: Fill in the template

  Replace every `{{Variable}}` in the loaded template with content derived from the codebase analysis.
  The template's own "Usage Instructions" and "Template Variables Reference" sections describe exactly
  what each variable expects — follow them. Use the generic code produced in Step 4 directly —
  all names are already generic. Preserve the structure and logic exactly as-is.
  Anti-patterns for "Possible outsider" entries come from the manifest's Possible outsider column (✓).

  # Step 6: Write the output file

  - Write the completed document to {{manifest_path}}/wow/ddd-domain-interface-wow.md
  - Strip everything from "Template Variables Reference" onward — the final file must contain
    no template instructions

  # Step 7: Mark classes as processed

  For every class retrieved in Step 2, call `update_row_by_column` using the Identifier column value
  to mark the Processed column with ✓. Process all classes — do not skip any.

  # Step 8: Quality review and cleanup

  Re-read the full document and apply the following cleanup:

  **Duplicate pattern detection**: If two or more patterns describe the same concept, merge
  them into the richer one and remove the weaker entry. Update all Pattern Index references.

  **Pattern completeness**: For any pattern missing a ✅ GOOD code example, a ❌ BAD
  counter-example, or a "Why it's bad" explanation, add the missing piece.

  **Open questions**: For each item in the "❓ Open Questions" section, check whether
  any source file read during this session already answers it. Remove answered questions and
  add the answer in the relevant section.

  **Dangling references**: If any pattern entry references a file identifier not listed in
  the Pattern Index table, add the missing row.
