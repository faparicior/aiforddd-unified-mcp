name: create-domain-saga-wow
description: Analyze Saga patterns in a code manifest and generate a DDD Domain Layer Saga WoW document
arguments:
  - name: manifest_path
    required: true
messages: |
  You are to analyze Saga patterns from a code manifest located at: {{manifest_path}}/code-manifest.md
  and produce a DDD Domain Layer - Sagas Way of Working (WoW) document.

  The output file must be written to: {{manifest_path}}/wow/ddd-saga-wow.md

  Note: Sagas orchestrate multi-step business workflows across multiple aggregates or bounded contexts,
  managing distributed transactions with compensating actions. They belong to the Domain/Application Layer.

  Follow these steps to produce a high-quality, pattern-rich WoW document.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-domain-saga-wow.md" to retrieve
  the full template. Keep it in context — you will fill every variable in it during Step 5.

  # Step 1: Assess the manifest

  - Call `filter_and_count_rows` with `columnName = "Layer"`, `value = "Domain Layer"`, `extraFilters = { "Category": "Saga" }`, `excludeFilters = { "Processed": "✓" }` to count unprocessed Saga classes in Domain Layer
  - If the count is 0, try `value = "Application Layer"` with same extra filters
  - If both are 0, write the output file with a note that no classes were found, then stop
  - Record the count(s); they determine the retrieval strategy in Step 2

  # Step 2: Collect all relevant classes

  - Retrieve all unprocessed Saga classes — try Domain Layer first, then Application Layer:
    filters = { "Layer": "Domain Layer", "Category": "Saga" }, excludeFilters = { "Processed": "✓" }
    filters = { "Layer": "Application Layer", "Category": "Saga" }, excludeFilters = { "Processed": "✓" }
  - Combine results. If empty after both, write a note and stop.
  - Note all classes where "Possible outsider" is marked (✓)

  # Step 3: Read source files

  Construct absolute file paths as: {{manifest_path}}/../<File column value from manifest>
  Process in batches of 6–8 per `read_multiple_files_compressed`. Read ENTIRE files.

  ## Proactive cross-cutting discovery
  Call `get_multiple_rows_by_multiple_columns` with
    filters = { "Layer": "Application Layer" },
    excludeFilters = { "Category": "Saga", "Processed": "✓" },
    selectColumns = ["Identifier", "Class", "File", "Category", "Description"]

  Add each returned class to the reading batch. Record in AdjacentCollaborators.
  Do NOT mark these classes as processed.

  ## Adjacent collaborator discovery
  For each directly referenced class not in the batch:
  1. Call `get_first_row_by_column` with column "Class".
  2. If not found, skip.
  3. Read and include.
  4. Record in AdjacentCollaborators.
  Do NOT mark as processed.

  # Step 4: Identify patterns

  Analyze each saga class. Focus on:

  ## Saga Step Patterns
  Focus on: Step definition, sequencing, isolation, idempotency.

  ## Compensation Patterns
  Focus on: Compensating actions, partial rollback, mapping forward-to-compensation.

  ## Saga State Patterns
  Focus on: State tracking, persistence, state machine vs. event sourcing.

  ## Event-Driven Saga Patterns
  Focus on: Event-based transitions, choreography vs. orchestration, correlation IDs.

  ## Error & Rollback Patterns
  Focus on: Exception handling, retry, dead letter queue strategies.

  For each pattern found:
  - Pattern IDs: SAGA-STP-XX, SAGA-CMP-XX, SAGA-STT-XX, SAGA-EVT-XX, SAGA-ERR-XX
  - Write a descriptive pattern name
  - GOOD + BAD code examples with generic names only
  - Source file and identifier
  - "Possible outsider" as anti-pattern if applicable

  # Step 5: Fill in the template

  Replace every `{{Variable}}` in the loaded template.

  # Step 6: Write the output file

  - Write to {{manifest_path}}/wow/ddd-saga-wow.md
  - Strip everything from "Template Variables Reference" onward
