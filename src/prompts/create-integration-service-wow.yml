name: create-integration-service-wow
description: Analyze Integration Service patterns in a code manifest and generate a DDD Infrastructure Layer Integration Service WoW document
arguments:
  - name: manifest_path
    required: true
messages: |
  You are to analyze Integration Service patterns from a code manifest located at: {{manifest_path}}/code-manifest.md
  and produce a DDD Infrastructure Layer - Integration Services Way of Working (WoW) document.

  The output file must be written to: {{manifest_path}}/wow/ddd-integration-service-wow.md

  Note: For API Clients (Feign/HTTP clients) use create-api-client-wow.
  For Repositories use create-repository-wow.
  For Configuration classes use create-configuration-wow.
  This prompt covers Infrastructure Integration Services — RowMappers, result mappers, metrics
  services, event processing wrappers, and other supporting infrastructure components that
  bridge between infrastructure mechanisms and domain/application concerns.

  Follow these steps to produce a high-quality, pattern-rich WoW document.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-integration-service-wow.md" to retrieve
  the full template. Keep it in context — you will fill every variable in it during Step 5.

  # Step 1: Assess the manifest

  - Call `filter_and_count_rows` with `columnName = "Layer"`, `value = "Infrastructure Layer"`, `extraFilters = { "Category": "Integration service" }`, `excludeFilters = { "Processed": "✓" }` to count unprocessed Integration service classes
  - If the call fails, stop immediately and report the error — do not infer counts from retrieval results
  - If the count is 0, do not search for alternatives or classes in other layers/categories.
    Write the output file with a note stating that no classes were found for the expected layer/category,
    and that the developer must ensure the manifest is catalogued correctly before running this prompt again.
    Then stop — do not proceed to Step 2.
  - Record the count explicitly; it determines the retrieval strategy in Step 2

  # Step 2: Collect all relevant classes

  - Retrieve all unprocessed Integration service classes in a single `get_multiple_rows_by_multiple_columns` call
    with filters = { "Layer": "Infrastructure Layer", "Category": "Integration service" }, excludeFilters = { "Processed": "✓" },
    and selectColumns = ["Class name", "File", "Possible outsider"]
  - If the result is empty, write a note to the output file stating all classes are already documented, then stop
  - Focus exclusively on: Integration service category in the Infrastructure Layer
  - Note all classes where the "Possible outsider" column is marked (✓) — these are candidate
    anti-pattern examples for the Anti-Patterns section of the document

  # Step 3: Read source files

  Construct absolute file paths as: {{manifest_path}}/../<File column value from manifest>
  (the manifest_path points to the .aiforddd directory; source files are relative to the repo root above it)

  Process source files in batches of 6–8 files per `read_multiple_files_compressed` call regardless
  of codebase size. Complete pattern analysis for each batch before reading the next.
  Read the ENTIRE file — no line limits, no shortcuts.

  # Step 4: Identify patterns

  Analyze each integration service class and extract reusable patterns. Focus on:

  ## Result Mapper Patterns
  Focus on: Data source result mapper implementations, data source result to domain object translation, null-safe field
  extraction, date/time type mapping, identifier parsing from strings,
  how composite domain objects are assembled from flat result sets.

  ## Data Transformation Patterns
  Focus on: How external data shapes (API responses, DB rows, event payloads) are mapped into domain
  models, aggregation logic within mappers (grouping rows by key, pre-computing lookup maps),
  period/range clamping, source breakdown extraction.

  ## Metrics & Observability Patterns
  Focus on: Counter/timer registration and increment patterns, tag/dimension strategies (event name,
  result, reason), namespace conventions, how metrics are scoped to specific event lifecycle stages
  (received, processed, rejected, failed), interface vs. implementation separation.

  ## Event Processing Support Patterns
  Focus on: Shared wrappers around event processing logic (try/catch classification: retryable vs
  non-retryable), metric recording integration, reuse across multiple consumers, how domain
  exceptions are translated to infrastructure decisions (reject, retry, DLQ).

  ## Utility & Extension Patterns
  Focus on: Extension methods or utility functions on infrastructure types,
  shared parsing utilities used across multiple consumers, validation helpers that protect
  domain layer from infrastructure-specific types.

  For each pattern found:
  - Assign a unique pattern ID following the format:
    - `SVC-MAP-XX` for result mapper patterns
    - `SVC-TRN-XX` for data transformation and aggregation patterns
    - `SVC-MET-XX` for metrics and observability patterns
    - `SVC-EVT-XX` for event processing support patterns
    - `SVC-UTL-XX` for utility and extension function patterns
  - Write a descriptive pattern name capturing the architectural intent
  - Extract a GOOD code example from the source file — copy the structure and logic exactly, but IMMEDIATELY replace every domain-specific class name, method name, field name, enum value, and identifier with a generic equivalent (Order, User, Product, Payment, Item, Customer). NO real names from the codebase may appear in the example.
  - Derive an anti-pattern (BAD) counterexample that illustrates the violation of the pattern
  - Record the source file name and class index identifier from the manifest
  - For classes flagged as "Possible outsider" (✓), document why the class may not belong in its
    current layer and include it as an anti-pattern entry

  # Step 5: Fill in the template

  Replace every `{{Variable}}` in the loaded template with content derived from the codebase analysis.
  The template's own "Usage Instructions" and "Template Variables Reference" sections describe exactly
  what each variable expects — follow them. Use the generic code produced in Step 4 directly —
  all names are already generic. Preserve
  the structure and logic exactly as-is.
  Document the RowMapper patterns, metrics namespace and tagging strategy, event processing
  wrapper design, and how shared utilities prevent duplication across consumers.
  Anti-patterns for "Possible outsider" entries come from the manifest's Possible outsider column (✓).

  # Step 6: Write the output file

  - Write the completed document to {{manifest_path}}/wow/ddd-integration-service-wow.md
  - Strip everything from "Template Variables Reference" onward — the final file must contain
    no template instructions

  # Step 7: Mark classes as processed

  For every class retrieved in Step 2, call `update_row_by_column` using the Identifier column value
  to mark the Processed column with ✓. Process all classes — do not skip any.
