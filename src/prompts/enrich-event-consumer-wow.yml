name: enrich-event-consumer-wow
description: >
  Enrich an existing Event Consumer WoW document with additional patterns from a new
  chunk of Event Consumer source files pre-selected by the CLI. The CLI provides the
  file list as files_json so this prompt never queries the manifest for primary
  Event Consumer classes. Adjacent collaborators and cross-cutting classes are still
  discovered reactively.
arguments:
  - name: manifest_path
    required: true
  - name: output_file
    required: true
  - name: files_json
    required: true
  - name: chunk_number
    required: true
  - name: chunk_total
    required: true
messages: |
  You are to enrich an existing DDD UI Layer - Event Consumers Way of Working (WoW)
  document with additional patterns discovered from a new chunk of Event Consumer source files.

  This is chunk {{chunk_number}} of {{chunk_total}}.
  Existing document: {{manifest_path}}/wow/{{output_file}}

  Note: For other UI layer concerns use the dedicated prompts:
  - REST controllers → create-controller-wow
  - Schedulers & batch processors → create-scheduler-wow

  Follow these steps precisely.

  # Step 0: Read the existing document

  Call `read_file` with path {{manifest_path}}/wow/{{output_file}} to load the current document.
  Keep it fully in context — you will update it in Step 4.

  Also call `get_template_content` with templatePath "wow/template-ddd-event-consumer-wow.md".
  Keep it in context — it provides the pattern ID conventions and section structure.

  Scan the existing document to determine:
  - Which pattern IDs are already used (CSM-HDL-XX, CSM-DSR-XX, CSM-ACK-XX, CSM-IDM-XX, CSM-DLQ-XX)
  - Which source file identifiers have already been documented in the Pattern Index
  - The current coverage count numbers

  # Step 1: Review this chunk's Event Consumer classes

  The following Event Consumer classes have been pre-selected for this chunk (JSON array):
  {{files_json}}

  Parse this JSON array. Each object contains:
  - File: source file path relative to the repository root
  - Identifier: unique class identifier from the manifest
  - Category: the class category
  - Layer: the architectural layer
  - Possible outsider: "✓" if flagged as a candidate anti-pattern, empty otherwise

  If the array is empty, stop without modifying the document.

  Record all entries — you will need File and Identifier for each.
  Note any entries where "Possible outsider" is "✓".

  # Step 2: Read source files

  Construct absolute file paths as: {{manifest_path}}/../<File value>
  (manifest_path points to .aiforddd; source files are relative to the repo root above it)

  ## Proactive cross-cutting discovery
  Before reading any event consumer file, query the manifest for classes in the User Interface
  Layer that are NOT Event Consumers and have not been processed — these may be shared base
  classes, global error handlers, or cross-cutting advice that affects all consumers.

  Call `get_multiple_rows_by_multiple_columns` with
    filters = { "Layer": "User Interface Layer" },
    excludeFilters = { "Category": "Event consumer", "Processed": "✓" },
    selectColumns = ["Identifier", "Class", "File", "Category", "Description"]

  For each class returned:
  1. Construct the absolute path as: {{manifest_path}}/../<File value>
  2. Add it to the reading batch alongside the event consumer files.
  3. Record its Identifier and file path in the AdjacentCollaborators list of the Coverage Summary,
     using the format: `- [Identifier] FileName.kt _(adjacent collaborator)_`.
  Do NOT mark these classes as processed — they will be covered by their own WoW document.

  If the call returns nothing, continue — the absence is itself informative.

  Process all files (event consumers from Step 1 + cross-cutting classes) in batches of 6–8 per
  `read_multiple_files_compressed` call.
  Complete pattern analysis for each batch before reading the next.
  Read the ENTIRE file — no line limits, no shortcuts.

  ## Adjacent collaborator discovery
  While reading each source file, note any directly referenced classes that are NOT in
  the batch but are relevant to understanding the consumer's behaviour — for example:
  - An integration event DTO deserialized by the consumer
  - A shared base consumer class
  - A use case the consumer delegates to
  - An idempotency store or deduplication service

  For each such class found:
  1. Call `get_first_row_by_column` on {{manifest_path}}/code-manifest.md with
     `columnName = "Class"` and the class name as `value` to retrieve its manifest row,
     including its `File` path and `Identifier`.
  2. If not found in the manifest, skip — do not search the filesystem directly.
  3. Construct the absolute path as: {{manifest_path}}/../<File value from manifest row>
  4. Call `read_multiple_files_compressed` on that path to read the file.
  5. Include its patterns in the analysis as if it were part of the batch.
  6. Record its Identifier and file path in the AdjacentCollaborators list of the Coverage Summary,
     using the format: `- [Identifier] FileName.kt _(adjacent collaborator)_`.
  Do NOT mark these classes as processed — they will be covered by their own WoW document.

  # Step 3: Identify new patterns

  For each file, identify patterns that are NOT already documented in the existing document.
  Focus on:

  ## Message Handling Patterns
  Focus on: Consumer listener annotations, topic/queue binding, consumer group configuration,
  base class hierarchies, delegation to application layer use cases.

  ## Deserialization Patterns
  Focus on: Event DTO structures, schema version handling, deserialization error handling,
  unknown field tolerance, schema registry usage.

  ## Acknowledgment & Offset Patterns
  Focus on: Manual vs. auto acknowledgment, offset commit strategy, acknowledgment timing
  relative to use case execution, failure-before-ack handling.

  ## Idempotency Patterns
  Focus on: Duplicate detection mechanisms, idempotency key sources, deduplication store usage,
  how already-processed messages are skipped.

  ## Dead Letter & Error Routing Patterns
  Focus on: DLQ/DLT routing configuration, retry policy, transient vs. permanent error
  classification, alerting on dead letter events.

  IMPORTANT — event consumer scope boundary:
  The event consumer WoW covers only message reception mechanics: listener binding, deserialization,
  acknowledgment, idempotency, and dead-letter routing.
  Integration event DTO internals (field definitions, nested objects, schema evolution) belong in
  the Integration Event WoW document — add a cross-reference note when encountered.
  Use case orchestration logic belongs in the Use Case WoW — add a cross-reference note only.

  For each pattern found:
  - Assign a unique pattern ID continuing from the highest existing number in each category:
    - `CSM-HDL-XX` for message handling and delegation patterns
    - `CSM-DSR-XX` for deserialization and schema patterns
    - `CSM-ACK-XX` for acknowledgment and offset management patterns
    - `CSM-IDM-XX` for idempotency handling patterns
    - `CSM-DLQ-XX` for dead letter and error routing patterns
  - Granularity rule: each distinct technique or concern deserves its own pattern entry.
    Do not collapse multiple distinct patterns into one.
  - Only document patterns NOT already present in the existing document.
  - Variations of existing patterns may be added as sub-notes, not new entries.
  - Write a descriptive pattern name capturing the architectural intent.
  - Extract a GOOD code example — copy the structure and logic exactly, but IMMEDIATELY replace
    every domain-specific class name, method name, field name, enum value, and identifier with a
    generic equivalent (Order, User, Product, Payment, Item, Customer).
    NO real names from the codebase may appear in the example.
  - Derive an anti-pattern (BAD) counterexample that illustrates the violation of the pattern.
  - Record the source file name and Identifier from the manifest.
  - For "Possible outsider" (✓) entries, document why the class may not belong in its current layer
    and include it as an anti-pattern entry.

  # Step 4: Update the document with targeted edits

  CRITICAL: Do NOT rewrite the entire file in a single operation. The document is large and
  full-file writes will cause streaming timeouts. Instead, apply a series of small, targeted
  edits — each modifying only the specific section that needs to change.

  Apply changes as a series of targeted edit operations on {{manifest_path}}/wow/{{output_file}}:
  1. For each new pattern entry: insert it after the last existing pattern in its section.
  2. For the Pattern Index table: append new rows before the table's closing.
  3. For Coverage Summary: update the analyzed count to include these new files.
  4. Update the "Key Files Analyzed" list to include newly analyzed files.

  Each edit should target a small, specific section. Make multiple edit calls rather than one
  large change. Never write the full document content in a single tool call.

  # Step 5: Verify the result

  - Read {{manifest_path}}/wow/{{output_file}} to verify all edits were applied correctly
  - The document must remain complete and valid after the edits
  - Strip any template instructions if accidentally reintroduced

  # Step 6: Quality review and cleanup

  Re-read the full document and apply the following cleanup as targeted edits:

  **Duplicate pattern detection**: If two or more patterns describe the same concept, merge
  them into the richer one and remove the weaker entry. Update all Pattern Index references
  and reassign IDs if needed to keep sequences gapless.

  **Pattern completeness**: For any pattern that is missing a ✅ GOOD code example, a ❌ BAD
  counter-example, or a "Why it's bad" explanation, add the missing piece using evidence
  from the source files already read in this session.

  **Open questions cleanup**: For each item in the "❓ Open Questions" section, check whether
  any source file read during this session already answers it. For each answered question:
  - Remove it from the open questions list
  - Add the answer as a note or observation in the most relevant pattern or in the
    Implementation Guidelines section

  **Dangling references**: If any pattern entry in the body references a file identifier
  (e.g. [abc123]) that is not listed in the Pattern Index table, add the missing row.

  Apply all cleanup as targeted edits — never rewrite the full document.
