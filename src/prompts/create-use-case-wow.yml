name: create-use-case-wow
description: Analyze use case patterns in a code manifest and generate a DDD Application Layer WoW document
arguments:
  - name: manifest_path
    required: true
messages: |
  You are to analyze use case and command patterns from a code manifest located at: {{manifest_path}}
  and produce a DDD Application Layer Way of Working (WoW) document.

  The output file must be written to: {{manifest_path}}/wow/ddd-use-case-wow.md

  Follow these steps to produce a high-quality, pattern-rich WoW document.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-use-case-wow.md" to retrieve
  the full template. Keep it in context — you will fill every variable in it during Step 5.

  # Step 1: Assess the manifest

  - Call `filter_and_count_rows` to count classes in the Application Layer (Layer = "Application Layer")
  - Call `filter_and_count_rows` to count classes in the User Interface Layer (Layer = "User Interface Layer")
  - Identify the total number of use cases, commands, and queries to analyze

  # Step 2: Collect all relevant classes

  Retrieve all classes from the manifest that belong to the Application Layer and User Interface Layer:
  - Call `get_multiple_rows_by_column` to retrieve Application Layer rows (8-15 per batch)
  - Call `get_multiple_rows_by_column` to retrieve User Interface Layer rows (8-15 per batch)
  - Focus on: Use case, Command, Query, Response, Controller, Event consumer categories

  # Step 3: Read source files

  For each batch of classes retrieved:
  - Use `read_multiple_files_compressed` to read all source files in the batch (MUST use absolute file paths)
  - Read the ENTIRE file — no line limits, no shortcuts
  - Read multiple related files simultaneously when they share patterns

  # Step 4: Identify patterns

  Analyze each class and extract reusable patterns. Group by category:

  ## Command Patterns
  Focus on: Command data structures, how they carry intent, naming conventions, field validation,
  immutability, factory methods, constructor patterns.

  ## Use Case Patterns
  Focus on: How use cases orchestrate domain operations, transaction boundaries (@Transactional usage),
  dependency injection style, error handling and exception propagation, repository usage,
  domain event emission, response mapping.

  For each pattern found:
  - Assign a unique pattern ID: `UC-CMD-XX` for command operations, `UC-QRY-XX` for query operations,
    `UC-ORD-XX` for orchestration, `UC-VAL-XX` for validation, `UC-INT-XX` for integration
  - Write a descriptive pattern name capturing the architectural intent
  - Extract a GOOD code example directly from the source file (use real code, not invented)
  - Derive an anti-pattern (BAD) counterexample that illustrates the violation of the pattern
  - Record the source file name and class index identifier from the manifest

  # Step 5: Fill in the template

  Replace every `{{Variable}}` in the loaded template with content derived from the codebase analysis.
  The template's own "Usage Instructions" and "Template Variables Reference" sections describe exactly
  what each variable expects — follow them. Do not invent examples; use real code from source files,
  replacing actual domain names with generic equivalents (Order, User, Product, Payment).
  Anti-patterns for "Possible outsider" entries come from the manifest's Possible outsider column (✓).

  # Step 6: Write the output file

  - Write the completed document to {{manifest_path}}/wow/ddd-use-case-wow.md
  - Strip everything from "Template Variables Reference" onward — the final file must contain
    no template instructions
