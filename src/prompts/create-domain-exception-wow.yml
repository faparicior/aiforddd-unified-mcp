name: create-domain-exception-wow
description: Analyze Domain Exception patterns in a code manifest and generate a DDD Domain Layer Exception WoW document
arguments:
  - name: manifest_path
    required: true
messages: |
  You are to analyze Domain Exception patterns from a code manifest located at: {{manifest_path}}/code-manifest.md
  and produce a DDD Domain Layer - Domain Exceptions Way of Working (WoW) document.

  The output file must be written to: {{manifest_path}}/wow/ddd-domain-exception-wow.md

  Note: For infrastructure-level exceptions (database, network, external service failures) use a dedicated
  infrastructure exception prompt. This prompt focuses exclusively on domain and application exception hierarchies.

  Follow these steps to produce a high-quality, pattern-rich WoW document.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-domain-exception-wow.md" to retrieve
  the full template. Keep it in context — you will fill every variable in it during Step 5.

  # Step 1: Assess the manifest

  - Call `filter_and_count_rows` with `columnName = "Layer"`, `value = "Domain Layer"`, `extraFilters = { "Category": "Domain exception" }`, `excludeFilters = { "Processed": "✓" }` to count unprocessed Domain exception classes in the Domain Layer
  - Call `filter_and_count_rows` with `columnName = "Layer"`, `value = "Application Layer"`, `extraFilters = { "Category": "Domain exception" }`, `excludeFilters = { "Processed": "✓" }` to count unprocessed Domain exception classes in the Application Layer
  - If either call fails, stop immediately and report the error — do not infer counts from retrieval results
  - If the total count is 0, do not search for alternatives or classes in other layers/categories.
    Write the output file with a note stating that no classes were found for the expected layer/category,
    and that the developer must ensure the manifest is catalogued correctly before running this prompt again.
    Then stop — do not proceed to Step 2.
  - Record both counts; the total determines the retrieval strategy in Step 2

  # Step 2: Collect all relevant classes

  - Retrieve all unprocessed Domain exception classes via two `get_multiple_rows_by_multiple_columns` calls:
    - filters = { "Layer": "Domain Layer", "Category": "Domain exception" }, excludeFilters = { "Processed": "✓" }, selectColumns = ["Class name", "File", "Possible outsider"]
    - filters = { "Layer": "Application Layer", "Category": "Domain exception" }, excludeFilters = { "Processed": "✓" }, selectColumns = ["Class name", "File", "Possible outsider"]
  - Combine both result sets into a single working set for analysis
  - If the combined result is empty, write a note to the output file stating all classes are already documented, then stop
  - Focus exclusively on: Domain exception category (both Domain and Application layers)
  - Note all classes where the "Possible outsider" column is marked (✓) — these are candidate
    anti-pattern examples for the Anti-Patterns section of the document

  # Step 3: Read source files

  Construct absolute file paths as: {{manifest_path}}/../<File column value from manifest>
  (the manifest_path points to the .aiforddd directory; source files are relative to the repo root above it)

  Process source files in batches of 6–8 files per `read_multiple_files_compressed` call regardless
  of codebase size. Complete pattern analysis for each batch before reading the next.
  Read the ENTIRE file — no line limits, no shortcuts.

  ## Proactive cross-cutting discovery
  Before reading exception files, query the manifest for classes in the Domain Layer
  that are NOT Domain Exceptions and have not been processed — these may be entities or
  value objects that throw the exceptions, providing context for exception usage.

  Call `get_multiple_rows_by_multiple_columns` with
    filters = { "Layer": "Domain Layer" },
    excludeFilters = { "Category": "Domain exception", "Processed": "✓" },
    selectColumns = ["Identifier", "Class", "File", "Category", "Description"]

  Also query the Application Layer for non-exception classes:
  Call `get_multiple_rows_by_multiple_columns` with
    filters = { "Layer": "Application Layer" },
    excludeFilters = { "Category": "Domain exception", "Processed": "✓" },
    selectColumns = ["Identifier", "Class", "File", "Category", "Description"]

  For each class returned:
  1. Construct the absolute path as: {{manifest_path}}/../<File value>
  2. Add it to the reading batch alongside the exception files.
  3. Record its Identifier and file path for the Pattern Index and Coverage Summary.
  Do NOT mark these classes as processed — they will be covered by their own WoW document.

  If the calls return nothing, continue — the absence is itself informative.

  ## Adjacent collaborator discovery
  While reading each source file, note any directly referenced classes that are NOT in
  the batch but are relevant to understanding the exception's role — for example:
  - A base exception class in the hierarchy
  - An entity or value object that throws this exception
  - A controller or consumer that catches and translates this exception

  For each such class found:
  1. Call `get_first_row_by_column` on {{manifest_path}}/code-manifest.md with
     `columnName = "Class"` and the class name as `value` to retrieve its manifest row.
  2. If not found in the manifest, skip.
  3. Construct the absolute path as: {{manifest_path}}/../<File value from manifest row>
  4. Call `read_multiple_files_compressed` on that path to read the file.
  5. Include its patterns in the analysis.
  6. Record its Identifier and file path for the Pattern Index and Coverage Summary.
  Do NOT mark these classes as processed.

  # Step 4: Identify patterns

  Analyze each domain exception class and extract reusable patterns. Focus on:

  ## Exception Hierarchy Patterns
  Focus on: Base exception classes (retryable vs non-retryable), inheritance structure,
  how the hierarchy communicates retry intent to infrastructure consumers, sealed/closed type hierarchies.

  ## Exception Construction Patterns
  Focus on: Constructor signatures (message-only, cause-only, message+cause), static factory methods,
  contextual data carried in the exception (IDs, field names, invalid values).

  ## Exception Semantics Patterns
  Focus on: How exception names encode domain language, which domain invariants or business rules
  each exception protects, specificity vs. generality trade-offs in exception design.

  ## Exception Usage Patterns
  Focus on: Where exceptions are thrown (constructors, factory methods, domain services, use cases),
  how they propagate through layers, how infrastructure consumers (consumers, controllers) map them.

  IMPORTANT — domain exception scope boundary:
  The domain exception WoW covers only exception design: hierarchy, construction, semantics,
  usage, and boundary mapping.
  Controller error handling mechanisms belong in the Controller WoW.
  Event consumer error routing belongs in the Event Consumer WoW.
  Add a cross-reference note when encountering out-of-scope patterns.

  For each pattern found:
  - Assign a unique pattern ID following the format:
    - `EXC-HIR-XX` for exception hierarchy and base class patterns
    - `EXC-CTR-XX` for exception construction and factory patterns
    - `EXC-SEM-XX` for exception semantics and domain language patterns
    - `EXC-USG-XX` for exception usage and propagation patterns
    - `EXC-MAP-XX` for exception-to-response mapping patterns (at boundaries)
  - Write a descriptive pattern name capturing the architectural intent
  - Extract a GOOD code example from the source file — copy the structure and logic exactly, but IMMEDIATELY replace every domain-specific class name, method name, field name, enum value, and identifier with a generic equivalent (Order, User, Product, Payment, Item, Customer). NO real names from the codebase may appear in the example.
  - Derive an anti-pattern (BAD) counterexample that illustrates the violation of the pattern
  - Record the source file name and class index identifier from the manifest
  - For classes flagged as "Possible outsider" (✓), document why the class may not belong in its
    current layer and include it as an anti-pattern entry

  # Step 5: Fill in the template

  Replace every `{{Variable}}` in the loaded template with content derived from the codebase analysis.
  The template's own "Usage Instructions" and "Template Variables Reference" sections describe exactly
  what each variable expects — follow them. Use the generic code produced in Step 4 directly —
  all names are already generic. Preserve
  the structure and logic exactly as-is.
  Document the retryable vs non-retryable distinction, the exception hierarchy, and how boundary layers
  (controllers, consumers) translate exceptions to external responses.
  Anti-patterns for "Possible outsider" entries come from the manifest's Possible outsider column (✓).

  # Step 6: Write the output file

  - Write the completed document to {{manifest_path}}/wow/ddd-domain-exception-wow.md
  - Strip everything from "Template Variables Reference" onward — the final file must contain
    no template instructions

  # Step 7: Mark classes as processed

  For every class retrieved in Step 2, call `update_row_by_column` using the Identifier column value
  to mark the Processed column with ✓. Process all classes — do not skip any.

  # Step 8: Quality review and cleanup

  Re-read the full document and apply the following cleanup:

  **Duplicate pattern detection**: If two or more patterns describe the same concept, merge
  them into the richer one and remove the weaker entry. Update all Pattern Index references.

  **Pattern completeness**: For any pattern missing a ✅ GOOD code example, a ❌ BAD
  counter-example, or a "Why it's bad" explanation, add the missing piece.

  **Open questions**: For each item in the "❓ Open Questions" section, check whether
  any source file read during this session already answers it. Remove answered questions and
  add the answer in the relevant section.

  **Dangling references**: If any pattern entry references a file identifier not listed in
  the Pattern Index table, add the missing row.
