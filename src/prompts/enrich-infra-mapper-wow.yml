name: enrich-infra-mapper-wow
description: >
  Enrich an existing Mapper WoW document with additional patterns from a new
  chunk of Mapper source files pre-selected by the CLI.
arguments:
  - name: manifest_path
    required: true
  - name: output_file
    required: true
  - name: files_json
    required: true
  - name: chunk_number
    required: true
  - name: chunk_total
    required: true
messages: |
  You are to enrich an existing DDD Infrastructure Layer - Mappers Way of Working (WoW)
  document with additional patterns discovered from a new chunk of Mapper source files.

  This is chunk {{chunk_number}} of {{chunk_total}}.
  Existing document: {{manifest_path}}/wow/{{output_file}}

  # Step 0: Read the existing document

  Call `read_file` with path {{manifest_path}}/wow/{{output_file}}.
  Also call `get_template_content` with templatePath "wow/template-ddd-infra-mapper-wow.md".

  Scan to determine used pattern IDs: MAP-DOM-XX, MAP-PRS-XX, MAP-NUL-XX, MAP-CMX-XX, MAP-TYP-XX

  # Step 1: Review this chunk's Mapper classes

  Parse JSON array: {{files_json}}. If empty, stop without modifying the document.

  # Step 2: Read source files

  Construct absolute paths: {{manifest_path}}/../<File value>

  Call `get_multiple_rows_by_multiple_columns` with
    filters = { "Layer": "Infrastructure Layer" },
    excludeFilters = { "Category": "Mapper", "Processed": "✓" },
    selectColumns = ["Identifier", "Class", "File", "Category", "Description"]

  Add to batch and record in AdjacentCollaborators. Process in batches of 6–8.

  For each referenced class not in batch: look up, read, record. Do not mark as processed.

  # Step 3: Identify new patterns NOT already documented

  Focus on: domain object mapping, persistence mapping, null/optional handling,
  complex/nested mapping, type conversions.

  Continue numbering: MAP-DOM-XX, MAP-PRS-XX, MAP-NUL-XX, MAP-CMX-XX, MAP-TYP-XX
  Generic names only.

  # Step 4: Targeted edits only — do NOT rewrite the entire file

  1. Insert new patterns in their section.
  2. Append Pattern Index rows.
  3. Update Coverage Summary counts.
  4. Update "Key Files Analyzed" list.

  # Step 5: Verify and cleanup

  - Merge duplicates, complete missing examples, remove answered questions.
