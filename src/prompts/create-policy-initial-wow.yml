name: create-policy-initial-wow
description: >
  Generate the first Policy WoW document from an initial chunk of source files
  pre-selected by the CLI. The CLI provides the file list as files_json so this
  prompt never queries the manifest for primary Policy classes.
  Adjacent collaborators and cross-cutting classes are still discovered reactively.
arguments:
  - name: manifest_path
    required: true
  - name: output_file
    required: true
  - name: total_files
    required: true
  - name: chunk_total
    required: true
  - name: files_json
    required: true
messages: |
  You are to analyze the first batch of Policy source files and produce a
  DDD Domain Layer - Policies Way of Working (WoW) document.

  This is chunk 1 of {{chunk_total}} total chunks. If {{chunk_total}} > 1, subsequent
  chunks will enrich this document with additional patterns — do NOT wait for them.
  Write a complete, useful document now using only the files in this chunk plus any
  adjacent collaborators you discover while reading them.

  Total Policy files across all chunks: {{total_files}}
  Document path: {{manifest_path}}/wow/{{output_file}}

  Note: Policies encapsulate changeable business decisions or strategies that vary by context,
  replacing conditional logic with polymorphism (Strategy pattern). They belong to the Domain Layer.
  Do not confuse with Domain Services (which orchestrate complex business operations across entities)
  or Specifications (which define composable predicates).

  Follow these steps precisely.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-policy-wow.md".
  Keep it in context — it provides the schema, pattern ID conventions, and variable
  definitions. You will fill every variable in it during Step 4.

  # Step 1: Review this chunk's Policy classes

  The following Policy classes have been pre-selected for this chunk (JSON array):
  {{files_json}}

  Parse this JSON array. Each object contains:
  - File: source file path relative to the repository root
  - Identifier: unique class identifier from the manifest
  - Category: the class category
  - Layer: the architectural layer
  - Possible outsider: "✓" if flagged as a candidate anti-pattern, empty otherwise

  If the array is empty, write the output file with a note that no Policy classes
  were found, and stop.

  Record all entries — you will need File and Identifier for each.
  Note any entries where "Possible outsider" is "✓".

  # Step 2: Read source files

  Construct absolute file paths as: {{manifest_path}}/../<File value>
  (manifest_path points to .aiforddd; source files are relative to the repo root above it)

  ## Proactive cross-cutting discovery
  Before reading any policy file, query the manifest for Domain Layer classes that
  use these policies to understand the injection points and context.

  Call `get_multiple_rows_by_multiple_columns` with
    filters = { "Layer": "Domain Layer" },
    excludeFilters = { "Category": "Policy", "Processed": "✓" },
    selectColumns = ["Identifier", "Class", "File", "Category", "Description"]

  For each class returned:
  1. Construct the absolute path as: {{manifest_path}}/../<File value>
  2. Add it to the reading batch alongside the policy files.
  3. Record its Identifier and file path in the AdjacentCollaborators list of the Coverage Summary,
     using the format: `- [Identifier] FileName.kt _(adjacent collaborator)_`.
  Do NOT mark these classes as processed — they will be covered by their own WoW document.

  If the call returns nothing, continue.

  Process all files in batches of 6–8 per `read_multiple_files_compressed` call.
  Complete pattern analysis for each batch before reading the next.
  Read the ENTIRE file — no line limits, no shortcuts.

  ## Adjacent collaborator discovery
  While reading each policy file, note any directly referenced classes that are NOT in
  the batch — for example:
  - Domain services or entities that inject and use these policies
  - Companion policies that form a policy family
  - Configuration or infrastructure that selects the active policy at runtime

  For each such class found:
  1. Call `get_first_row_by_column` on {{manifest_path}}/code-manifest.md with
     `columnName = "Class"` and the class name as `value` to retrieve its manifest row.
  2. If not found in the manifest, skip.
  3. Construct the absolute path as: {{manifest_path}}/../<File value from manifest row>
  4. Call `read_multiple_files_compressed` on that path to read the file.
  5. Include its patterns in the analysis.
  6. Record its Identifier and file path in the AdjacentCollaborators list of the Coverage Summary,
     using the format: `- [Identifier] FileName.kt _(adjacent collaborator)_`.
  Do NOT mark these classes as processed.

  # Step 3: Identify patterns

  Analyze each policy class and extract reusable patterns. Focus on:

  ## Policy Definition Patterns
  Focus on: How policies declare their strategy interface, method naming conventions
  (calculate, evaluate, apply, determine), use of domain objects in method signatures.

  ## Strategy & Injection Patterns
  Focus on: How policies are injected (constructor injection, service locator, factory),
  how the correct policy variant is selected at runtime, policy families grouped by interface.

  ## Policy Injection Patterns
  Focus on: How policies are wired into domain services and entities, default policy fallbacks,
  null object patterns for optional policies.

  ## Evolution Patterns
  Focus on: How policies evolve over time (new variants, deprecated variants), backward
  compatibility strategies, versioned policy interfaces.

  ## Evaluation & Lifecycle Patterns
  Focus on: Whether policies are stateless (preferred) or stateful, thread-safety, caching
  of expensive policy computations, policy composition and chaining.

  For each pattern found:
  - Assign a unique pattern ID following the format:
    - `POL-DEF-XX` for policy definition and interface patterns
    - `POL-STG-XX` for strategy and injection patterns
    - `POL-INJ-XX` for injection and wiring patterns
    - `POL-EVO-XX` for policy evolution and versioning patterns
    - `POL-EVL-XX` for evaluation, lifecycle, and composition patterns
  - Write a descriptive pattern name capturing the architectural intent
  - Extract a GOOD code example — replace all domain-specific names with generic equivalents
    (Order, User, Product, Payment, Item, Customer). NO real names from the codebase.
  - Derive an anti-pattern (BAD) counterexample
  - Record the source file name and Identifier from the manifest
  - For "Possible outsider" classes (✓), document why and include as anti-pattern

  # Step 4: Write the document

  Replace every `{{Variable}}` in the loaded template with content derived from the analysis.
  Follow the template's own "Usage Instructions" and "Template Variables Reference" sections.

  For the Coverage Summary: use {{total_files}} as the total class count.

  If {{chunk_total}} > 1, add this note at the very end:

  > **Note**: This document was generated from chunk 1/{{chunk_total}} of the codebase.
  > It will be enriched with additional patterns from the remaining chunks.

  Write the completed document to {{manifest_path}}/wow/{{output_file}}.
  Strip everything from "Template Variables Reference" onward.

  # Step 5: Verify

  Read {{manifest_path}}/wow/{{output_file}} and confirm:
  - The document is complete and valid.
  - All patterns are in the correct sections.
  - No template instructions remain in the file.
