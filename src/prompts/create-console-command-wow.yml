name: create-console-command-wow
description: Analyze Console Command patterns in a code manifest and generate a DDD UI Layer Console Command WoW document
arguments:
  - name: manifest_path
    required: true
messages: |
  You are to analyze Console Command patterns from a code manifest located at: {{manifest_path}}/code-manifest.md
  and produce a DDD UI Layer - Console Commands Way of Working (WoW) document.

  The output file must be written to: {{manifest_path}}/wow/ddd-console-command-wow.md

  Note: For other UI layer concerns use the dedicated prompts:
  - REST controllers → create-controller-wow
  - Scheduled jobs → create-scheduler-wow
  - Event consumers → create-event-consumer-wow

  Follow these steps to produce a high-quality, pattern-rich WoW document.

  # Step 0: Load the template

  Call `get_template_content` with templatePath "wow/template-ddd-console-command-wow.md" to retrieve
  the full template. Keep it in context — you will fill every variable in it during Step 5.

  # Step 1: Assess the manifest

  - Call `filter_and_count_rows` with `columnName = "Layer"`, `value = "User Interface Layer"`, `extraFilters = { "Category": "Console command" }`, `excludeFilters = { "Processed": "✓" }` to count unprocessed Console Command classes
  - If the count is 0, write the output file with a note that no classes were found, then stop.
  - Record the count; it determines the retrieval strategy in Step 2.

  # Step 2: Collect all relevant classes

  - Retrieve all unprocessed Console Command classes:
    filters = { "Layer": "User Interface Layer", "Category": "Console command" }, excludeFilters = { "Processed": "✓" },
    selectColumns = ["Identifier", "Class", "File", "Possible outsider"]
  - Note all classes where "Possible outsider" is marked (✓).

  # Step 3: Read source files

  Construct absolute file paths as: {{manifest_path}}/../<File column value from manifest>

  Process source files in batches of 6–8 per `read_multiple_files_compressed` call.
  Complete pattern analysis for each batch before reading the next.
  Read the ENTIRE file — no line limits, no shortcuts.

  ## Proactive cross-cutting discovery
  Query the manifest for classes in the User Interface Layer that are NOT Console Commands
  and have not been processed.

  Call `get_multiple_rows_by_multiple_columns` with
    filters = { "Layer": "User Interface Layer" },
    excludeFilters = { "Category": "Console command", "Processed": "✓" },
    selectColumns = ["Identifier", "Class", "File", "Category", "Description"]

  For each class returned:
  1. Construct the absolute path as: {{manifest_path}}/../<File value>
  2. Add it to the reading batch alongside the console command files.
  3. Record its Identifier and file path in the AdjacentCollaborators list of the Coverage Summary,
     using the format: `- [Identifier] FileName.kt _(adjacent collaborator)_`.
  Do NOT mark these classes as processed.

  ## Adjacent collaborator discovery
  While reading each source file, note any directly referenced classes that are NOT in
  the batch but are relevant to understanding the command's behaviour — for example:
  - A use case the command delegates to
  - An input validator or argument parser
  - A progress reporter or output formatter

  For each such class found:
  1. Call `get_first_row_by_column` on {{manifest_path}}/code-manifest.md with
     `columnName = "Class"` and the class name as `value`.
  2. If not found in the manifest, skip.
  3. Construct the absolute path as: {{manifest_path}}/../<File value from manifest row>
  4. Call `read_multiple_files_compressed` on that path to read the file.
  5. Include its patterns in the analysis.
  6. Record its Identifier and file path in the AdjacentCollaborators list of the Coverage Summary,
     using the format: `- [Identifier] FileName.kt _(adjacent collaborator)_`.
  Do NOT mark these classes as processed.

  # Step 4: Identify patterns

  Analyze each console command class and extract reusable patterns. Focus on:

  ## Command Definition Patterns
  Focus on: Command name and description registration, argument/option declaration,
  required vs. optional arguments, default values, type coercion.

  ## Input Validation Patterns
  Focus on: Argument validation before execution, error output for invalid input,
  early exit strategy, validation rule co-location.

  ## Execution & Delegation Patterns
  Focus on: How the command delegates to application layer use cases, transaction boundaries,
  mapping CLI arguments to application commands/queries, exit code conventions.

  ## Output & Feedback Patterns
  Focus on: Progress output for long-running commands, structured vs. human-readable output,
  verbosity flags, writing to stdout vs. stderr.

  ## Error Handling Patterns
  Focus on: Exception-to-exit-code mapping, user-friendly error messages, debug mode output,
  handling domain exceptions vs. infrastructure failures.

  For each pattern found:
  - Assign a unique pattern ID:
    - `CMD-DEF-XX` for command definition and registration patterns
    - `CMD-VAL-XX` for input validation patterns
    - `CMD-EXE-XX` for execution and delegation patterns
    - `CMD-OUT-XX` for output and feedback patterns
    - `CMD-ERR-XX` for error handling patterns
  - Write a descriptive pattern name capturing the architectural intent
  - Extract a GOOD code example — replace every domain-specific name with a generic equivalent
    (Order, User, Product, Payment, Item, Customer). NO real names from the codebase may appear.
  - Derive an anti-pattern (BAD) counterexample
  - Record the source file name and Identifier from the manifest
  - For classes flagged as "Possible outsider" (✓), include as anti-pattern entry

  # Step 5: Fill in the template

  Replace every `{{Variable}}` in the loaded template with content derived from the analysis.
  Follow the template's own "Usage Instructions" and "Template Variables Reference" exactly.

  # Step 6: Write the output file

  Write the completed document to {{manifest_path}}/wow/ddd-console-command-wow.md.
  Strip everything from "Template Variables Reference" onward.

  # Step 7: Mark classes as processed

  For every class retrieved in Step 2, call `update_row_by_column` using the Identifier column value
  to mark the Processed column with ✓. Process all classes — do not skip any.

  # Step 8: Quality review and cleanup

  Re-read the full document and apply cleanup:
  - Merge duplicate patterns; update Pattern Index references.
  - Complete any pattern missing a GOOD example, BAD counter-example, or "Why it's bad".
  - Remove answered open questions; add answers in relevant sections.
  - Add missing Pattern Index rows for any dangling references.
